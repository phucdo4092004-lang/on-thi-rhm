<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thư Viện Lý Thuyết - Phúc Đẹp Trai</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #007bff; --accent: #ff00de; }
    [data-theme="dark"] { --bg: #020617; --card: rgba(15, 23, 42, 0.95); --text: #f8fafc; --bg-theme: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
    [data-theme="light"] { --bg: #f8f9fa; --card: rgba(255, 255, 255, 0.98); --text: #1e293b; --bg-theme: none; }
    
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.8; transition: 0.3s; }
    #universe { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: var(--bg-theme); background-size: cover; transition: 0.5s;}
    
    .header { position: sticky; top: 0; background: var(--card); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 1000; backdrop-filter: blur(10px); }
    .back-btn { background: var(--primary); color: #fff; padding: 8px 20px; border-radius: 12px; font-weight: 800; text-decoration: none; font-size: 13px; text-transform: uppercase; transition: 0.2s; box-shadow: 0 0 10px rgba(0,123,255,0.4); }
    .back-btn:hover { transform: scale(1.05); }

    .header-controls { display: flex; gap: 10px; align-items: center; }
    .voice-select { background: rgba(128,128,128,0.2); border: 1px solid var(--primary); color: var(--text); font-family: inherit; font-weight: 700; font-size: 12px; padding: 8px 10px; border-radius: 12px; outline: none; max-width: 130px; }
    .btn-speak { background: var(--accent); color: #fff; border: none; padding: 8px 15px; border-radius: 12px; font-weight: 900; font-size: 12px; cursor: pointer; box-shadow: 0 0 10px var(--accent); transition: 0.2s; }
    .btn-speak:hover { transform: scale(1.05); }
    .mode-btn { background: transparent; border: 2px solid var(--primary); color: var(--primary); border-radius: 50%; width: 35px; height: 35px; font-size: 16px; cursor: pointer; transition: 0.3s; }
    .mode-btn:hover { background: var(--primary); color: #fff; }

    .container { max-width: 850px; margin: 40px auto 80px; padding: 40px; background: var(--card); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); border: 1px solid rgba(128,128,128,0.2); }
    h1 { color: var(--primary); font-size: 32px; font-weight: 900; margin-top: 0; border-bottom: 2px dashed rgba(128,128,128,0.3); padding-bottom: 20px; }
    #content { white-space: pre-wrap; font-size: 17px; text-align: justify; }

    /* NÚT DONATE XỊN XÒ */
    .donate-badge { position: fixed; bottom: 20px; left: 20px; background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--accent); color: var(--text); padding: 12px 18px; border-radius: 15px; font-size: 13px; font-weight: 700; z-index: 1000; box-shadow: 0 5px 15px rgba(255,0,222,0.2); transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 8px;}
    .donate-badge b { color: var(--accent); font-size: 15px; font-weight: 900; letter-spacing: 0.5px;}
    .donate-badge:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,0,222,0.5); }
    
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 15px; }
      .container { margin: 20px; padding: 20px; }
      h1 { font-size: 24px; }
      .donate-badge { bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; padding: 10px; width: max-content; }
      .donate-badge:hover { transform: translateX(-50%) translateY(-3px); }
    }
  </style>
</head>
<body>
  <div id="universe"></div>

  <div class="header">
    <a href="index.html" class="back-btn">⬅ TRỞ VỀ SẢNH</a>
    
    <div class="header-controls">
      <select id="voice-select" class="voice-select" title="Chọn giọng đọc"></select>
      <button class="btn-speak" onclick="speakDocument()" id="btn-speak">🔊 ĐỌC TÀI LIỆU</button>
      <button class="mode-btn" onclick="toggleMode()" title="Sáng/Tối">🌓</button>
    </div>
  </div>

  <div class="container">
    <h1 id="title">Đang tải...</h1>
    <div id="content">Đang tải nội dung tài liệu...</div>
  </div>

  <div class="donate-badge" onclick="copySTK()">
    💖 Donate cho Phúc đi: <b>BIDV 8812766209</b>
  </div>

  <script src="KhoDuLieu.js"></script>
  <script>
    // --- HỆ THỐNG GIAO DIỆN & DỮ LIỆU ---
    function toggleMode() {
      const h = document.documentElement; 
      h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function copySTK() {
      navigator.clipboard.writeText('8812766209');
      alert("Cảm ơn sếp! Đã copy STK Phúc Đẹp Trai: 8812766209");
    }

    window.onload = function() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (id && typeof KHO_TAI_LIEU !== 'undefined' && KHO_TAI_LIEU[id]) {
        document.getElementById('title').innerText = KHO_TAI_LIEU[id].tieuDe;
        document.getElementById('content').innerHTML = KHO_TAI_LIEU[id].noiDung;
      } else {
        alert("Lỗi: Không tìm thấy tài liệu này!");
        window.location.href = "index.html";
      }
    };

    // --- HỆ THỐNG TRỢ LÝ ẢO ĐỌC VĂN BẢN (TTS) ---
    let synth = window.speechSynthesis;
    let viVoices = [];

    function populateVoiceList() {
      viVoices = synth.getVoices().filter(v => v.lang.includes('vi'));
      const voiceSelect = document.getElementById('voice-select');
      voiceSelect.innerHTML = '';
      if(viVoices.length === 0) {
        voiceSelect.innerHTML = '<option value="">Không có giọng VN</option>';
        return;
      }
      viVoices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.textContent = voice.name.replace('Vietnamese', 'VN'); 
        option.value = i;
        voiceSelect.appendChild(option);
      });
    }
    
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function speakDocument() {
      const btn = document.getElementById('btn-speak');
      
      // Nếu đang đọc thì bấm nút sẽ dừng
      if (synth.speaking) { 
        synth.cancel(); 
        btn.innerHTML = "🔊 ĐỌC TÀI LIỆU";
        btn.style.background = "var(--accent)";
        return; 
      }
      
      // Lấy toàn bộ chữ trong bài (Bỏ qua các thẻ HTML như <img>)
      const titleText = document.getElementById('title').innerText;
      const contentText = document.getElementById('content').innerText;
      const textToRead = titleText + ". " + contentText;

      if (textToRead.trim() === "") return;

      const utterThis = new SpeechSynthesisUtterance(textToRead);
      const voiceSelect = document.getElementById('voice-select');
      
      if(viVoices.length > 0 && voiceSelect.value !== '') {
        utterThis.voice = viVoices[voiceSelect.value];
      }
      
      utterThis.rate = 0.95; // Tốc độ đọc dễ nghe
      
      // Khi đọc xong tự đổi nút lại
      utterThis.onend = function() {
        btn.innerHTML = "🔊 ĐỌC TÀI LIỆU";
        btn.style.background = "var(--accent)";
      }

      synth.speak(utterThis);
      btn.innerHTML = "⏸ DỪNG ĐỌC";
      btn.style.background = "#ef4444"; // Đổi sang màu đỏ cảnh báo đang đọc
    }

    // Dừng đọc nếu người dùng thoát trang
    window.onbeforeunload = function () {
      if (synth.speaking) synth.cancel();
    };
  </script>
</body>
</html>
