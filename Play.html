<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phòng Thi VIP - Phúc Đẹp Trai</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #00f2fe; --primary-gradient: linear-gradient(90deg, var(--primary), #ffffff);
      --bg-theme: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
    }

    [data-theme="dark"] {
      --bg-card: rgba(15, 23, 42, 0.85); --card-border: rgba(255, 255, 255, 0.15);
      --text-main: #f8fafc; --text-sub: #94a3b8; 
      --option-bg: rgba(30, 41, 59, 0.8); --option-border: rgba(255,255,255,0.1);
      --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #10b981; --correct-text: #6ee7b7;
      --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #ef4444; --wrong-text: #fca5a5;
      --overlay-bg: rgba(0,0,0,0.9); --drawer-bg: rgba(15, 23, 42, 0.95);
    }

    [data-theme="light"] {
      --bg-card: rgba(255, 255, 255, 0.9); --card-border: rgba(0, 0, 0, 0.15);
      --text-main: #0f172a; --text-sub: #475569; 
      --option-bg: rgba(241, 245, 249, 0.9); --option-border: rgba(0,0,0,0.15);
      --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #059669; --correct-text: #047857;
      --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #dc2626; --wrong-text: #b91c1c;
      --overlay-bg: rgba(255,255,255,0.9); --drawer-bg: rgba(255, 255, 255, 0.95);
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; background: #000; transition: color 0.3s ease; }
    #universe { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: var(--bg-theme); transition: filter 1s ease, background 1.5s ease; background-size: cover; background-position: center; }
    #universe::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.3); opacity: 0; transition: opacity 0.5s; pointer-events: none; }
    [data-theme="light"] #universe::after { opacity: 1; }

    #floating-objects { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; overflow: hidden; }
    .emoji-floater { position: absolute; font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); animation: floatRandom 20s infinite linear alternate; opacity: 0.8; }
    @keyframes floatRandom { 0% { transform: translate(0, 0) rotate(0deg) scale(0.8); } 50% { transform: translate(100px, -100px) rotate(180deg) scale(1.2); } 100% { transform: translate(-50px, 150px) rotate(360deg) scale(0.9); } }

    .sticky-header { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, var(--overlay-bg), transparent); padding: 15px 20px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;}
    .header-top { display: flex; align-items: center; gap: 15px; }
    .header-top h1 { margin: 0; font-size: 18px; font-weight: 900; color: var(--text-main); text-shadow: 0 0 10px var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 10px;}
    .back-btn-top { background: var(--option-bg); color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 15px; font-size: 11px; text-decoration: none; font-weight: bold; transition: 0.2s;}
    .back-btn-top:hover { background: var(--primary); color: #000; }
    
    .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .score-badge { background: var(--option-bg); color: #facc15; padding: 6px 12px; border-radius: 15px; font-weight: 900; font-size: 13px; border: 1px solid #facc15; }
    .theme-selector { background: var(--option-bg); border: 1px solid var(--primary); color: var(--text-main); font-family: inherit; font-weight: 700; font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; outline: none; }
    .mode-toggle { background: var(--option-bg); border: 1px solid var(--primary); font-size: 14px; padding: 5px 10px; border-radius: 20px; cursor: pointer; color: var(--primary); display: flex; align-items: center; justify-content: center;}

    .progress-container { width: 100%; position: absolute; bottom: 0; left: 0; background-color: rgba(255,255,255,0.1); height: 4px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--primary);}

    /* PHÒNG THI CHÍNH */
    #quiz-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .question-box { position: absolute; width: 92%; max-width: 700px; max-height: 75vh; overflow-y: auto; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--card-border); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; color: var(--text-main); }
    .question-box.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
    .question-number { text-align: center; font-size: 13px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; display: block; text-shadow: 0 0 5px var(--primary); }
    .question-title { font-weight: 800; font-size: 18px; margin-bottom: 25px; line-height: 1.6; text-align: center; }
    .option { position: relative; padding: 14px 18px; margin-bottom: 10px; background: var(--option-bg); border: 2px solid var(--option-border); border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.2s; }
    .option:hover { border-color: var(--primary); transform: translateX(5px); }
    .correct { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text) !important; }
    .incorrect { background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color: var(--wrong-text) !important; }
    .disabled { pointer-events: none; opacity: 0.8; }

    /* NÚT ĐIỀU HƯỚNG */
    .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: var(--option-bg); border: 2px solid var(--primary); color: var(--primary); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; z-index: 1050; transition: 0.2s; box-shadow: 0 0 10px var(--primary);}
    #nav-prev { left: 15px; } #nav-next { right: 15px; }
    @media (max-width: 768px) { .nav-arrow { top: auto; bottom: 85px; width: 40px; height: 40px; } }

    /* NÚT DONATE CHỐT GÓC DƯỚI */
    .donate-badge { position: fixed; bottom: 20px; left: 20px; background: var(--bg-card); border: 1px solid #ff00de; color: var(--text-main); padding: 12px 18px; border-radius: 15px; font-size: 13px; font-weight: 700; z-index: 1000; box-shadow: 0 5px 15px rgba(255,0,222,0.2); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
    .donate-badge b { color: #ff00de; font-size: 15px; font-weight: 900; }
    @media (max-width: 768px) { .donate-badge { bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; width: max-content;} }

    /* HIỆU ỨNG TỰ CHUYỂN CÂU */
    .jump-loader { display: none; margin-top: 20px; text-align: center; }
    .jump-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 8px; overflow: hidden; }
    .jump-bar-fill { height: 100%; background: var(--primary); width: 100%; box-shadow: 0 0 10px var(--primary);}

    /* MAP DRAWER */
    #map-drawer { position: fixed; top: 0; right: -340px; width: 300px; height: 100vh; background: var(--drawer-bg); border-left: 2px solid var(--primary); z-index: 9999; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    #map-drawer.open { right: 0; }
    .node-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
    .node { aspect-ratio: 1; border-radius: 8px; background: var(--option-bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; cursor: pointer; border: 1px solid var(--option-border); transition: 0.2s;}
    .node-correct { background: var(--correct-border); color: #000; border-color: var(--correct-border);}
    .node-wrong { background: var(--wrong-border); color: #fff; border-color: var(--wrong-border);}
    .node-active { border: 2px solid var(--primary); transform: scale(1.15); box-shadow: 0 0 10px var(--primary); }

    /* HIỆU ỨNG COMBO STREAK */
    #streak-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) scale(0); background: linear-gradient(45deg, #ff0f7b, #f89b29); color: #fff; padding: 10px 25px; border-radius: 30px; font-weight: 900; font-size: 16px; z-index: 9999; box-shadow: 0 10px 20px rgba(255,15,123,0.4); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none;}
    #streak-toast.show { transform: translateX(-50%) scale(1); opacity: 1; }

    /* MÀN HÌNH TỔNG KẾT VIP */
    #end-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 20px; box-sizing: border-box;}
    .end-box { background: var(--bg-card); border: 2px solid var(--primary); border-radius: 30px; padding: 40px; max-width: 500px; width: 100%; box-shadow: 0 0 50px rgba(0,242,254,0.3); animation: pop 0.5s ease; }
    .end-title { font-size: 26px; font-weight: 900; color: var(--primary); margin-bottom: 10px; text-transform: uppercase;}
    .end-score { font-size: 60px; font-weight: 900; margin: 10px 0; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
    .end-rank { font-size: 16px; font-weight: 800; color: #facc15; margin-bottom: 30px; background: rgba(250,204,21,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block;}
    
    .btn-action-end { color: #000; border: none; padding: 15px 20px; border-radius: 15px; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; width: 100%; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;}
    .btn-action-end:hover { transform: scale(1.03); filter: brightness(1.1);}
    .btn-view { background: #10b981; color: #fff; box-shadow: 0 5px 15px rgba(16,185,129,0.3); }
    .btn-retry-wrong { background: linear-gradient(90deg, #f59e0b, #facc15); box-shadow: 0 5px 15px rgba(245,158,11,0.3); }
    .btn-retry-all { background: var(--primary-gradient); box-shadow: 0 5px 15px rgba(0,242,254,0.3); }
    .btn-exit { background: var(--option-bg); color: var(--text-main); border: 2px solid var(--primary); }

    .error-screen { color: #ef4444; background: var(--bg-card); padding: 40px; border-radius: 20px; border: 2px dashed #ef4444; text-align: center; max-width: 500px; z-index: 99999; position: relative;}
  </style>
</head>
<body>

  <div id="universe"></div>
  <div id="floating-objects"></div>
  <div id="streak-toast">🔥 ĐANG CHÁY! COMBO x3</div>

  <div class="donate-badge" onclick="copySTK()">
    💖 Donate cho Phúc đi: <b>BIDV 8812766209</b>
  </div>

  <div id="nav-prev" class="nav-arrow" onclick="move(-1)" style="display:none;">&lt;</div>
  <div id="nav-next" class="nav-arrow" onclick="move(1)" style="display:none;">&gt;</div>

  <div class="sticky-header">
    <div class="header-top">
      <h1 id="app-title">
        <a href="index.html" class="back-btn-top">⬅ THOÁT</a>
        <span>ĐANG TẢI...</span>
      </h1>
    </div>
    <div class="header-controls">
      <div class="score-badge" id="score-text">Đúng: 0%</div>
      <select class="theme-selector" id="theme-selector" onchange="changeTheme(this.value)">
        <option value="space">🌌 Vũ Trụ</option>
        <option value="love">💖 Tình Yêu</option>
        <option value="spring">🌸 Mùa Xuân</option>
        <option value="summer">🌻 Mùa Hạ</option>
        <option value="autumn">🍁 Mùa Thu</option>
        <option value="winter">❄️ Mùa Đông</option>
        <option value="nature">🌿 Thiên Nhiên</option>
        <option value="animals">🐾 Động Vật</option>
        <option value="cyberpunk">⚡ Cyberpunk</option>
      </select>
      <button class="mode-toggle" id="mute-btn" onclick="toggleMute()" title="Bật/Tắt Âm thanh">🔊</button>
      <button class="mode-toggle" onclick="toggleMode()" title="Sáng/Tối">🌓</button>
      <button class="mode-toggle" onclick="toggleMap()" title="Tiến độ">🗺️</button>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <div id="map-drawer">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h3 style="margin:0; color:var(--primary);">TIẾN ĐỘ</h3>
      <button onclick="toggleMap()" style="background:none; border:none; color:#ef4444; font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div class="node-grid" id="node-grid"></div>
  </div>

  <div id="quiz-container"></div>

  <div id="end-screen">
    <div class="end-box">
      <div class="end-title">HOÀN THÀNH CHIẾN DỊCH!</div>
      <div style="color: var(--text-sub); font-size: 14px; font-weight: bold;">Tỷ lệ chính xác của sếp:</div>
      <div class="end-score" id="final-score">100%</div>
      <div class="end-rank" id="final-rank">🏆 THỦ KHOA RHM</div>
      
      <button class="btn-action-end btn-view" onclick="closeEndScreen()">👀 ĐÓNG BẢNG ĐỂ XEM LẠI BÀI</button>
      <button class="btn-action-end btn-retry-wrong" id="btn-retry-wrong" onclick="initGame('wrong')">🔥 LÀM LẠI CÁC CÂU SAI</button>
      <button class="btn-action-end btn-retry-all" onclick="initGame('all')">🔄 LÀM LẠI TỪ ĐẦU</button>
      <button class="btn-action-end btn-exit" onclick="location.href='index.html'">⬅ VỀ SẢNH CHỜ</button>
    </div>
  </div>

  <script src="KhoDuLieu.js"></script>
  <script>
    let originalQuestions = []; // Lưu bản gốc không bao giờ thay đổi
    let questions = [];         // Bản copy để làm bài
    let currentIdx = 0; let score = 0; let done = 0;
    let jumpTimer = null; let currentLevel = 0;
    let streak = 0; 
    let isMuted = false;
    let audioCtx = null;

    function copySTK() {
      navigator.clipboard.writeText('8812766209');
      alert("Đã copy STK Phúc Đẹp Trai! Cảm ơn sếp nhé!");
    }

    function toggleMode() {
      const h = document.documentElement;
      h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    }

    function toggleMute() {
      isMuted = !isMuted;
      document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
    }

    function toggleMap() { document.getElementById('map-drawer').classList.toggle('open'); }

    const themes = {
      space:     { bg: 'radial-gradient(circle at center, #1e1b4b 0%, #020617 100%)', p: '#00f2fe', obj: ['🛸','🚀','🌌','🛰️','☄️'] },
      love:      { bg: 'radial-gradient(circle at center, #43000b 0%, #1a0004 100%)', p: '#ff0844', obj: ['💖','🌹','🧸','💌','💘','💕','🥰'] },
      spring:    { bg: 'linear-gradient(to bottom, #2e1437, #943b54)', p: '#ff7eb3', obj: ['🌸','🦋','🌷','🌱','🕊️'] },
      summer:    { bg: 'linear-gradient(to bottom, #001d3d, #00b4db)', p: '#f6d365', obj: ['🌻','🍉','🍦','🦀','🌴','☀️'] },
      autumn:    { bg: 'linear-gradient(to bottom, #3f2b96, #a8c0ff)', p: '#ff9966', obj: ['🍁','🍂','🦊','🐿️','🌾','🦉'] },
      winter:    { bg: 'linear-gradient(to bottom, #141e30, #243b55)', p: '#a1c4fd', obj: ['❄️','⛄','🐧','🧊','🎿','🏔️'] },
      nature:    { bg: 'linear-gradient(to bottom, #0f2027, #203a43)', p: '#11998e', obj: ['🌲','🍄','🏔️','🍀','🌈','🦅'] },
      animals:   { bg: 'linear-gradient(to bottom, #134e5e, #71b280)', p: '#20b2aa', obj: ['🐼','🦁','🐯','🐨','🐵','🐘'] },
      cyberpunk: { bg: 'radial-gradient(circle at center, #0f0c29 0%, #302b63 50%, #24243e 100%)', p: '#bc13fe', obj: ['💻','🔋','🔌','⚡','🎮','🤖'] }
    };

    function spawnObj(t) {
      const e = document.createElement('div'); e.className = 'emoji-floater';
      e.innerText = t.obj[Math.floor(Math.random()*t.obj.length)];
      e.style.left = Math.random()*90+'vw'; e.style.top = Math.random()*90+'vh';
      e.style.animationDuration = (15 + Math.random()*15) + 's';
      document.getElementById('floating-objects').appendChild(e);
    }

    function changeTheme(v) {
      const t = themes[v]; 
      document.documentElement.style.setProperty('--primary', t.p);
      document.getElementById('universe').style.background = t.bg;
      
      document.getElementById('floating-objects').innerHTML = '';
      for(let i=0; i<12; i++) spawnObj(t);
      currentLevel = 0; 
    }

    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const cont = document.getElementById('quiz-container');

      if(typeof KHO_DE_THI === 'undefined') {
        cont.innerHTML = `<div class="error-screen"><h2>❌ LỖI NGHIÊM TRỌNG</h2><p>Hệ thống không đọc được file <b>KhoDuLieu.js</b>.</p></div>`;
        return;
      }
      if(!id || !KHO_DE_THI[id]) { 
        cont.innerHTML = `<div class="error-screen"><h2>❌ KHÔNG TÌM THẤY ĐỀ</h2><p>Đề thi này không tồn tại hoặc link bị sai.</p><br><a href="index.html" style="color:#00f2fe;">Về trang chủ</a></div>`;
        return; 
      }
      
      const raw = KHO_DE_THI[id].noiDung;
      document.querySelector('#app-title span').innerText = KHO_DE_THI[id].tenDe;

      let q = null;
      raw.split('\n').forEach(line => {
        line = line.trim(); if(!line) return;
        if(line.match(/^Câu\s*(hỏi)?\s*\d+\s*[:\.\-]?/i)) {
          if(q) originalQuestions.push(q);
          q = { title: line.replace(/^Câu\s*(hỏi)?\s*\d+\s*[:\.\-]?/i, '').trim(), opts: [], ans: null };
        } else if(line.startsWith('*')) {
          if(q) q.opts.push({ text: line.substring(1).trim(), isC: true });
        } else if(line.startsWith('•')) {
          if(q) q.opts.push({ text: line.substring(1).trim(), isC: false });
        } else if(q && q.opts.length === 0) {
          q.title += "<br>" + line;
        }
      });
      if(q) originalQuestions.push(q);
      
      if(originalQuestions.length === 0) {
        cont.innerHTML = `<div class="error-screen"><h2>❌ ĐỀ THI TRỐNG</h2><p>Sếp up đề mà quên chưa ghi câu hỏi rồi!</p></div>`;
        return;
      }

      initGame('all'); // Nạp dữ liệu vào questions và khởi động
      changeTheme(document.getElementById('theme-selector').value);
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    };

    // Hàm thiết lập lại trò chơi (Làm lại từ đầu hoặc Làm lại câu sai)
    function initGame(mode) {
      if(jumpTimer) clearInterval(jumpTimer);
      document.getElementById('end-screen').style.display = 'none';

      if(mode === 'all') {
        // Deep copy toàn bộ mảng gốc
        questions = JSON.parse(JSON.stringify(originalQuestions));
      } else if (mode === 'wrong') {
        // Chỉ lấy những câu sai ở bài trước
        questions = questions.filter(x => x.ans === false);
        questions.forEach(x => x.ans = null); // Reset đáp án
      }

      currentIdx = 0; score = 0; done = 0; streak = 0; currentLevel = 0;
      document.getElementById('quiz-container').innerHTML = ''; // Dọn sạch DOM cũ
      render(); buildMap(); show(0); updateStats();
    }

    function playSfx(isC) {
      if(isMuted || !audioCtx) return;
      if(audioCtx.state === 'suspended') audioCtx.resume();
      try {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = isC ? 880 : 200; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
      } catch(e) {}
    }

    function showStreak() {
      if(streak < 2) return;
      const toast = document.getElementById('streak-toast');
      let msg = `🔥 COMBO x${streak}`;
      if(streak >= 5) msg = `🌟 THẦN ĐỒNG! COMBO x${streak}`;
      if(streak >= 10) msg = `👑 BẤT BẠI! COMBO x${streak}`;
      
      toast.innerText = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function render() {
      const cont = document.getElementById('quiz-container');
      questions.forEach((q, i) => {
        const div = document.createElement('div'); div.className = 'question-box'; div.id = 'q-'+i;
        div.innerHTML = `<span class="question-number">CÂU SỐ ${i+1} / ${questions.length}</span>
                         <div class="question-title">${q.title}</div>
                         <div class="opts"></div>
                         <div class="jump-loader" id="loader-${i}">
                            <div style="font-size:11px; font-weight:800; color:var(--text-sub);">ĐANG CHUYỂN CÂU...</div>
                            <div class="jump-bar-bg"><div class="jump-bar-fill" id="fill-${i}"></div></div>
                         </div>`;
        const optsCont = div.querySelector('.opts');
        q.opts.forEach((opt, oIdx) => {
          const oDiv = document.createElement('div'); oDiv.className = 'option'; oDiv.innerHTML = opt.text;
          oDiv.onclick = function() {
            if(q.ans !== null) return; // Đã trả lời thì không cho chọn lại
            q.ans = opt.isC; done++;
            Array.from(optsCont.children).forEach(c => c.classList.add('disabled'));
            
            if(opt.isC) { 
              this.classList.add('correct'); score++; playSfx(true);
              streak++; showStreak();
            } else { 
              this.classList.add('incorrect'); playSfx(false);
              streak = 0; 
              Array.from(optsCont.children).forEach((c, x) => { if(q.opts[x].isC) c.classList.add('correct'); }); 
            }
            
            updateStats(); updateNode(i); startJump(i);
          };
          optsCont.appendChild(oDiv);
        });
        cont.appendChild(div);
      });
    }

    function startJump(i) {
      if(i >= questions.length - 1) {
        setTimeout(() => showEndScreen(), 1000);
        return;
      }
      
      const loader = document.getElementById(`loader-${i}`);
      const fill = document.getElementById(`fill-${i}`);
      loader.style.display = 'block';
      let w = 100;
      jumpTimer = setInterval(() => {
        w -= 5; fill.style.width = w + '%';
        if(w <= 0) { clearInterval(jumpTimer); move(1); }
      }, 50);
    }

    function showEndScreen() {
      const p = Math.round((score / questions.length) * 100);
      document.getElementById('final-score').innerText = p + '%';
      
      let rank = "CẦN CỐ GẮNG THÊM 🥲";
      if(p >= 50) rank = "TÂN BINH NHA KHOA 🥉";
      if(p >= 70) rank = "BÁC SĨ TẬP SỰ 🥈";
      if(p >= 90) rank = "CHUYÊN GIA RHM 🥇";
      if(p === 100) rank = "🏆 THỦ KHOA 2027 🏆";
      
      document.getElementById('final-rank').innerText = rank;
      
      // Nếu đúng 100% thì ẩn nút làm lại câu sai đi
      document.getElementById('btn-retry-wrong').style.display = (p === 100) ? 'none' : 'flex';
      
      document.getElementById('end-screen').style.display = 'flex';
      
      if(p >= 50) {
        for(let i=0; i<30; i++) {
          const t = themes[document.getElementById('theme-selector').value];
          spawnObj(t);
        }
      }
    }

    function closeEndScreen() {
      document.getElementById('end-screen').style.display = 'none';
      // Hiện thông báo hướng dẫn người dùng tự chuyển câu
      const toast = document.getElementById('streak-toast');
      toast.innerText = "👀 Dùng mũi tên hoặc Bản đồ để xem bài nhé!";
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function updateStats() {
      const p = Math.round((score / (done || 1)) * 100);
      document.getElementById('score-text').innerText = `Đúng: ${p}%`;
      const progress = (done / questions.length) * 100;
      document.getElementById('progress-bar').style.width = progress + '%';

      let nLvl = Math.floor(done / 5);
      if(nLvl > currentLevel) {
        currentLevel = nLvl;
        const t = themes[document.getElementById('theme-selector').value];
        spawnObj(t);
      }
    }

    function buildMap() {
      const grid = document.getElementById('node-grid');
      grid.innerHTML = ''; // Dọn map cũ
      questions.forEach((_, i) => {
        const n = document.createElement('div'); n.className = 'node'; n.id = 'node-'+i; n.innerText = i+1;
        n.onclick = () => { toggleMap(); moveToIndex(i); };
        grid.appendChild(n);
      });
    }

    function updateNode(i) {
      const n = document.getElementById('node-'+i);
      if(n) n.classList.add(questions[i].ans ? 'node-correct' : 'node-wrong');
    }

    function show(i) {
      document.querySelectorAll('.question-box').forEach(b => b.classList.remove('active'));
      const target = document.getElementById('q-'+i);
      if(target) target.classList.add('active');
      
      document.querySelectorAll('.node').forEach(n => n.classList.remove('node-active'));
      const activeNode = document.getElementById('node-'+i);
      if(activeNode) activeNode.classList.add('node-active');
      
      document.getElementById('nav-prev').style.display = i > 0 ? 'flex' : 'none';
      document.getElementById('nav-next').style.display = i < questions.length - 1 ? 'flex' : 'none';
    }

    function move(d) {
      if(jumpTimer) clearInterval(jumpTimer);
      currentIdx = Math.max(0, Math.min(questions.length-1, currentIdx + d));
      show(currentIdx);
    }

    function moveToIndex(i) {
      if(jumpTimer) clearInterval(jumpTimer);
      currentIdx = i;
      show(currentIdx);
    }
  </script>
</body>
</html>
