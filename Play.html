<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hạm Đội RHM - Phúc VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2fe; --primary-grad: linear-gradient(90deg, #00f2fe, #4facfe); --bg-theme: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); }
        [data-theme="dark"] { --bg-card: rgba(15, 23, 42, 0.85); --text: #f8fafc; --opt-bg: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.15); --drawer: rgba(15, 23, 42, 0.95); --glass: rgba(255,255,255,0.1); }
        [data-theme="light"] { --bg-card: rgba(255, 255, 255, 0.9); --text: #0f172a; --opt-bg: #f1f5f9; --border: rgba(0,0,0,0.1); --drawer: #f8f9fa; --glass: rgba(0,0,0,0.05); }

        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); margin: 0; overflow: hidden; height: 100vh; background: #000; transition: 0.3s; }
        #universe { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; background: var(--bg-theme); transition: filter 1.5s ease-in-out, background 1s; }
        #floating-objects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none; overflow: hidden; }
        .emoji-floater { position: absolute; font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); animation: floatRandom 20s infinite linear alternate; opacity: 0.7; }
        @keyframes floatRandom { 100% { transform: translate(100px, -100px) rotate(360deg); } }

        .milestone-burst { position: absolute; animation: burst 1.5s ease-out forwards; z-index: 9999; font-size: 50px; pointer-events: none;}
        @keyframes burst { 0% { transform: translate(0, 0) scale(0.5); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(360deg); opacity: 0; } }

        .sticky-header { position: fixed; top: 0; width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .btn-tool { background: var(--glass); color: var(--text); border: 1px solid var(--border); padding: 10px 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 13px; text-decoration: none; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; box-sizing: border-box; }
        .btn-tool:hover { background: var(--primary-grad); color: #000; border-color: transparent; }
        .btn-exit { width: auto; padding: 8px 15px; border-radius: 50px; background: var(--primary-grad); color: #000; border: none; }
        .btn-menu { width: auto; padding: 8px 15px; border-radius: 50px; border: 1px solid var(--primary); color: var(--primary); }
        .btn-speak { background: linear-gradient(45deg, #ff00de, #ff8a00); color: #fff; border: none; }
        .title-text { font-weight: 900; color: var(--primary); font-size: 14px; text-shadow: 0 0 10px var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40vw; }

        .drawer { position: fixed; top: 0; right: -320px; width: 280px; height: 100vh; background: var(--drawer); border-left: 2px solid var(--primary); z-index: 9999; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding: 25px; box-sizing: border-box; overflow-y: auto; box-shadow: -10px 0 30px rgba(0,0,0,0.5);}
        .drawer.open { right: 0; }
        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 9998; display: none; backdrop-filter: blur(5px);}
        .drawer-overlay.show { display: block; }
        .setting-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .score-badge { background: var(--opt-bg); color: #facc15; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 16px; border: 1px dashed #facc15; text-align: center; }

        #quiz-container { display: flex; align-items: center; justify-content: center; height: 100vh; padding: 15px; box-sizing: border-box; }
        .question-box { background: var(--bg-card); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); width: 100%; max-width: 600px; padding: 35px 25px; border-radius: 24px; border: 1px solid var(--border); display: none; box-shadow: 0 15px 40px rgba(0,0,0,0.4); max-height: 80vh; overflow-y: auto; }
        .question-box.active { display: block; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .progress-text-top { text-align: center; color: var(--primary); font-weight: 900; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; background: rgba(0,242,254,0.1); padding: 5px 15px; border-radius: 20px; display: inline-block; border: 1px solid var(--primary);}
        .option { background: var(--opt-bg); padding: 14px 18px; margin-bottom: 12px; border-radius: 16px; cursor: pointer; border: 1px solid var(--border); border-left: 4px solid var(--border); transition: 0.2s; font-weight: 700; font-size: 15px; }
        .option:hover { border-left-color: var(--primary); background: rgba(0, 242, 254, 0.1); transform: translateX(5px); }
        .correct { background: rgba(16, 185, 129, 0.15) !important; border-left: 4px solid #10b981 !important; border-color: #10b981 !important; color: #10b981 !important; }
        .wrong { background: rgba(239, 68, 68, 0.15) !important; border-left: 4px solid #ef4444 !important; border-color: #ef4444 !important; color: #ef4444 !important; }
        .disabled { pointer-events: none; opacity: 0.6; }

        .sc-img { display: block; max-width: 100%; border-radius: 12px; margin: 15px auto; border: 2px solid var(--primary); }
        .sc-red { color: #ff4d4d; font-weight: 800; }
        .sc-blue { color: #4da6ff; font-weight: 800; }

        .nav-arrow { position: fixed; top: 50%; background: var(--glass); backdrop-filter: blur(10px); border: 2px solid var(--primary); color: var(--primary); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; z-index: 100; transform: translateY(-50%); transition: 0.2s;}
        .nav-arrow:hover { background: var(--primary); color: #000; transform: translateY(-50%) scale(1.1); box-shadow: 0 0 15px var(--primary);}
        #nav-prev { left: 10px; } #nav-next { right: 10px; }
        
        .progress-bar-bg { position: fixed; bottom: 0; left: 0; height: 8px; width: 100%; background: rgba(255,255,255,0.1); z-index: 1000; }
        .progress-bar { height: 100%; background: var(--primary-grad); width: 0%; transition: width 0.4s ease; box-shadow: 0 -2px 15px var(--primary); }
        .progress-percent-badge { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); font-weight: 900; color: var(--primary); font-size: 13px; z-index: 1001; background: rgba(0,0,0,0.7); padding: 6px 16px; border-radius: 20px; border: 1px solid var(--primary); backdrop-filter: blur(5px); letter-spacing: 1px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}

        .node-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .node { aspect-ratio: 1; border-radius: 10px; background: var(--opt-bg); display: flex; align-items: center; justify-content: center; font-weight: 800; cursor: pointer; border: 1px solid var(--border); font-size: 12px;}
        .node-correct { background: #10b981; color: #fff; border-color: #10b981; }
        .node-wrong { background: #ef4444; color: #fff; border-color: #ef4444; }
        .node-active { border: 2px solid var(--primary); transform: scale(1.15); box-shadow: 0 0 15px var(--primary); }

        #streak-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) scale(0); background: linear-gradient(45deg, #ff0f7b, #f89b29); color: #fff; padding: 10px 25px; border-radius: 50px; font-weight: 900; z-index: 2000; transition: 0.3s; pointer-events: none;}
        #streak-toast.show { transform: translateX(-50%) scale(1); }

        #end-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .end-box { background: var(--bg-card); border: 2px solid var(--primary); border-radius: 24px; padding: 30px; text-align: center; width: 90%; max-width: 400px; }
        .btn-end { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; transition: 0.2s;}
        
        .donate-badge { position: fixed; bottom: 60px; right: 20px; background: var(--glass); backdrop-filter: blur(10px); border: 2px dashed #ff00de; padding: 8px 15px; border-radius: 50px; font-size: 11px; font-weight: 800; cursor: pointer; z-index: 1000; box-shadow: 0 0 15px rgba(255,0,222,0.2); transition: 0.3s;}
        .donate-badge:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 10px 25px rgba(245,158,11,0.5); }
    </style>
</head>
<body>

<div id="universe"></div>
<div id="floating-objects"></div>
<div id="streak-toast">🔥 COMBO x3</div>

<div class="sticky-header">
    <a href="index.html" class="btn-tool btn-exit">⬅ THOÁT</a>
    <span id="de-title" class="title-text">ĐANG TẢI...</span>
    <button class="btn-tool btn-menu" onclick="toggleMenu()">⚙️ MENU</button>
</div>

<div id="drawer-overlay" class="drawer-overlay" onclick="toggleMenu()"></div>

<div id="settings-drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 25px;">
        <h3 style="margin:0; color:var(--primary); font-weight:900;">⚙️ TÙY CHỈNH</h3>
        <button onclick="toggleMenu()" style="background:none; border:none; color:var(--text); font-size:24px; cursor:pointer;">&times;</button>
    </div>
    <div class="setting-group"><div class="score-badge" id="score-text">Đã làm: 0/0 <br>Tỷ lệ đúng: 0%</div></div>
    
    <div class="setting-group">
        <button onclick="showEndScreen(); toggleMenu();" class="btn-tool" style="background:#ef4444; color:#fff; border:none;">🛑 NỘP BÀI / KẾT THÚC SỚM</button>
    </div>

    <div class="setting-group" style="flex-direction: row; gap: 10px;">
        <button class="btn-tool" onclick="adjSize(2)">A+ Phóng to</button>
        <button class="btn-tool" onclick="adjSize(-2)">A- Thu nhỏ</button>
    </div>
    <div class="setting-group">
        <select id="voice-sel" class="btn-tool" style="outline:none; text-align:center;"></select>
        <button class="btn-tool btn-speak" onclick="speak()">🔊 ĐỌC ĐỀ BÀI</button>
    </div>
    <div class="setting-group">
        <select class="btn-tool" id="theme-selector" onchange="changeTheme(this.value)" style="outline:none; text-align:center;">
            <option value="space">🌌 Chủ đề: Vũ Trụ</option>
            <option value="spring">🌸 Chủ đề: Mùa Xuân</option>
            <option value="summer">☀️ Chủ đề: Mùa Hạ</option>
            <option value="autumn">🍂 Chủ đề: Mùa Thu</option>
            <option value="winter">❄️ Chủ đề: Mùa Đông</option>
            <option value="love">💖 Chủ đề: Tình Yêu</option>
            <option value="animals">🐾 Chủ đề: Động Vật</option>
            <option value="nature">🌲 Chủ đề: Thiên Nhiên</option>
            <option value="tech">💻 Chủ đề: Công Nghệ</option>
        </select>
        <button onclick="toggleMode()" class="btn-tool">🌓 GIAO DIỆN SÁNG/TỐI</button>
    </div>
    <div class="setting-group">
        <button onclick="toggleMap(); toggleMenu();" class="btn-tool" style="background:var(--primary-grad); color:#000; border:none;">🗺️ XEM BẢN ĐỒ CÂU HỎI</button>
    </div>
</div>

<div id="nav-prev" class="nav-arrow" onclick="move(-1)">&lt;</div>
<div id="nav-next" class="nav-arrow" onclick="move(1)">&gt;</div>

<div id="quiz-container"></div>

<div id="map-drawer" class="drawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3 style="color:var(--primary); margin:0;">BẢN ĐỒ CHIẾN DỊCH</h3>
        <button onclick="toggleMap()" style="background:rgba(255,0,0,0.1); border:1px solid #ef4444; color:#ef4444; width:30px; height:30px; border-radius:50%; font-size:18px; cursor:pointer;">&times;</button>
    </div>
    <div class="node-grid" id="node-grid"></div>
</div>

<div class="progress-percent-badge" id="progress-percent-text">TIẾN ĐỘ: 0%</div>
<div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>

<div class="donate-badge" onclick="copySTK()">💖 Donate cho phúc đi Đỗ Hồng Phúc <b style="color:#ff00de;">BIDV 8812766209</b></div>

<div id="end-screen">
    <div class="end-box">
        <h2 style="color:var(--primary); font-weight:900; margin-top:0; text-transform: uppercase;">CHIẾN DỊCH HOÀN TẤT!</h2>
        <div style="font-size: 60px; font-weight: 900; text-shadow: 0 0 20px rgba(255,255,255,0.3);" id="final-score">100%</div>
        <div id="final-rank" style="color: #facc15; font-weight: 800; margin-bottom: 30px; font-size: 16px; letter-spacing: 1px;">THỦ KHOA RHM</div>
        <button class="btn-end" style="background:linear-gradient(90deg, #10b981, #059669); color:#fff;" onclick="showReviewMode()">👀 Xem Bảng Vàng (Bảo Mật)</button>
        <button class="btn-end" style="background:var(--primary-grad); color:#000;" onclick="initGame('wrong')">🔥 Phục thù câu sai</button>
        <button class="btn-end" style="background:#fff; color:#000;" onclick="initGame('all')">🔄 Chơi lại từ đầu</button>
    </div>
</div>

<script>
    let originalQ = []; let questions = []; let currentIdx = 0; let score = 0; let done = 0;
    let streak = 0; let fontSize = 18; let jumpTimer = null; let audioCtx = null;
    let synth = window.speechSynthesis; let viVoices = []; let lastLevel5Percent = 0; 

    function toggleMenu() { document.getElementById('settings-drawer').classList.toggle('open'); document.getElementById('drawer-overlay').classList.toggle('show'); }
    function parseSC(txt) { return txt.replace(/\[IMG\](.*?)\[\/IMG\]/gi, '<img src="$1" class="sc-img">').replace(/\[B\](.*?)\[\/B\]/gi, '<b>$1</b>').replace(/\[RED\](.*?)\[\/RED\]/gi, '<span class="sc-red">$1</span>').replace(/\[BLUE\](.*?)\[\/BLUE\]/gi, '<span class="sc-blue">$1</span>').replace(/\[BR\]/gi, '<br>'); }
    function copySTK() { navigator.clipboard.writeText('8812766209'); alert("Đã copy STK Đỗ Hồng Phúc!"); }

    const themes = {
        space: { bg: 'radial-gradient(circle at center, #1e1b4b 0%, #020617 100%)', p: '#00f2fe', obj: ['🛸','🚀','🌌','🛰️','☄️'] },
        spring: { bg: 'linear-gradient(to bottom, #2e1437, #943b54)', p: '#ff7eb3', obj: ['🌸','🦋','🌷','🌱','🕊️'] },
        summer: { bg: 'linear-gradient(to bottom, #001d3d, #00b4db)', p: '#f6d365', obj: ['🌻','☀️','🍉','🍦','🦀'] },
        autumn: { bg: 'linear-gradient(to bottom, #3f2b96, #a8c0ff)', p: '#ff9966', obj: ['🍁','🍂','🐿️','🦊','🌾'] },
        winter: { bg: 'linear-gradient(to bottom, #141e30, #243b55)', p: '#a1c4fd', obj: ['❄️','⛄','🐧','🧊','🏔️'] },
        love: { bg: 'linear-gradient(to bottom, #43000b, #ff0f7b)', p: '#ff0844', obj: ['💖','🌹','💌','🧸','💘'] },
        animals: { bg: 'linear-gradient(to bottom, #134e5e, #71b280)', p: '#2ebf91', obj: ['🦁','🐼','🐾','🐯','🐨'] },
        nature: { bg: 'linear-gradient(to bottom, #0f2027, #2c5364)', p: '#11998e', obj: ['🌲','🌈','🍄','🍀','🦅'] },
        tech: { bg: 'radial-gradient(circle at center, #000000, #434343)', p: '#00ff00', obj: ['💻','🤖','⚡','🔋','🔌'] }
    };

    function toggleMode() { const h = document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme')==='dark'?'light':'dark'); }
    function toggleMap() { document.getElementById('map-drawer').classList.toggle('open'); }
    function adjSize(v) { fontSize += v; document.querySelectorAll('.question-title').forEach(e => e.style.fontSize = fontSize + 'px'); }

    function populateVoices() {
        viVoices = synth.getVoices().filter(v => v.lang.includes('vi'));
        document.getElementById('voice-sel').innerHTML = viVoices.length ? viVoices.map((v, i) => `<option value="${i}">${v.name.substring(0,15)}</option>`).join('') : '<option value="">No VN Voice</option>';
    }
    populateVoices(); if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;

    function speak() {
        if (synth.speaking) { synth.cancel(); return; }
        const q = questions[currentIdx];
        let text = q.title.replace(/<[^>]*>?/gm, '') + ". ";
        q.opts.forEach((o, i) => text += `Lựa chọn ${i+1}: ${o.text.replace(/<[^>]*>?/gm, '')}. `);
        const utter = new SpeechSynthesisUtterance(text);
        if(viVoices.length > 0) utter.voice = viVoices[document.getElementById('voice-sel').value];
        synth.speak(utter); toggleMenu(); 
    }

    window.onload = function() {
        const id = new URLSearchParams(window.location.search).get('id');
        const title = new URLSearchParams(window.location.search).get('title');
        if(!id) { location.href='index.html'; return; }
        document.getElementById('de-title').innerText = title || "BỘ ĐỀ RHM";

        const rawData = localStorage.getItem(id);
        if(!rawData) { document.getElementById('quiz-container').innerHTML = "<div style='color:#fff'>Lỗi kết nối CSDL. Vui lòng quay lại sảnh chính.</div>"; return; }

        let q = null;
        rawData.split(/\\n|\n/).forEach(line => {
            line = line.trim(); if(!line) return;
            if(line.match(/^Câu\s*\d+:/i)) {
                if(q) originalQ.push(q);
                // GIỮ LẠI CÂU X: CHỈ XÓA "(1 ĐÁP ÁN)"
                let cleanedTitle = line.replace(/\[?(Chọn )?\d+ đáp án\]?/gi, '').replace(/\(?(Chọn )?\d+ đáp án\)?/gi, '').trim();
                q = { title: parseSC(cleanedTitle), opts: [], explanation: "", ans: null, userPick: -1 };
            } else if (q) {
                if(line.startsWith('*')) {
                    q.opts.push({ text: parseSC(line.substring(1).trim()), isC: true });
                } else if(line.startsWith('•')) {
                    q.opts.push({ text: parseSC(line.substring(1).trim()), isC: false });
                } else {
                    let cleanedLine = line.replace(/\[?(Chọn )?\d+ đáp án\]?/gi, '').replace(/\(?(Chọn )?\d+ đáp án\)?/gi, '').trim();
                    if(q.opts.length === 0) {
                        q.title += "<br>" + parseSC(cleanedLine); 
                    } else {
                        q.explanation += (q.explanation ? "<br>" : "") + parseSC(cleanedLine); 
                    }
                }
            }
        });
        if(q) originalQ.push(q);
        
        if(originalQ.length === 0) { document.getElementById('quiz-container').innerHTML = "<div style='color:#fff'>Đề thi trống!</div>"; return; }

        initGame('all'); changeTheme('space');
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    };

    function initGame(mode) {
        document.getElementById('end-screen').style.display = 'none';
        
        const cont = document.getElementById('quiz-container');
        cont.style.display = 'flex';
        cont.style.height = '100vh';
        cont.style.overflowY = 'visible';
        cont.style.padding = '15px';
        cont.style.marginTop = '0';
        
        document.querySelector('.progress-bar-bg').style.display = 'block';
        document.getElementById('progress-percent-text').style.display = 'block';
        document.getElementById('nav-prev').style.display = 'flex';
        document.getElementById('nav-next').style.display = 'flex';

        questions = mode === 'all' ? JSON.parse(JSON.stringify(originalQ)) : questions.filter(x => x.ans === false);
        questions.forEach(q => { q.ans = null; q.userPick = -1; });
        currentIdx = 0; score = 0; done = 0; streak = 0; lastLevel5Percent = 0;
        cont.innerHTML = '';
        render(); buildMap(); show(0); updateStats();
    }

    function render() {
        const cont = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            const div = document.createElement('div'); div.className = 'question-box'; div.id = 'q-'+i;
            div.innerHTML = `<div style="text-align:center; width:100%;"><div class="progress-text-top">CÂU ${i+1} / ${questions.length}</div></div>
                             <div class="question-title" style="font-size:${fontSize}px; font-weight:800; margin-bottom:20px; text-align:center;">${q.title}</div>
                             <div class="opts"></div>
                             <div id="loader-${i}" style="display:none; text-align:center;"></div>`;
            const oCont = div.querySelector('.opts');
            
            q.opts.forEach((opt, oIdx) => {
                const oDiv = document.createElement('div'); oDiv.className = 'option'; oDiv.innerHTML = opt.text;
                oDiv.onclick = function() {
                    if(q.ans !== null) return; 
                    q.ans = opt.isC; 
                    q.userPick = oIdx;
                    done++;
                    Array.from(oCont.children).forEach(c => c.classList.add('disabled'));
                    
                    if(opt.isC) { 
                        this.classList.add('correct'); score++; streak++; playSfx(true); 
                        if(streak >= 3) showStreak(); 
                    } else { 
                        this.classList.add('wrong'); streak = 0; playSfx(false); 
                        Array.from(oCont.children).forEach((c, x) => { if(q.opts[x].isC) c.classList.add('correct'); }); 
                    }
                    
                    updateStats(); updateNode(i); 
                    
                    const l = document.getElementById(`loader-${i}`);
                    l.style.display = 'block';
                    let msgHTML = '';
                    let autoNext = false;

                    if (q.explanation) {
                        msgHTML += `<div style="text-align:left; background: rgba(0,242,254,0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--primary); margin-top: 15px; font-size: 14px;"><b>💡 Bổ sung / Giải thích:</b><br>${q.explanation}</div>`;
                        msgHTML += `<div style="margin-top:10px; font-size:13px; color:var(--primary); font-weight:900;">👉 Bấm mũi tên <b>❯</b> để tiếp tục</div>`;
                    } 
                    else if (!opt.isC) {
                        msgHTML += `<div style="font-size:13px; font-weight:900; color:#ef4444; padding: 12px; background: rgba(239,68,68,0.15); border-radius: 12px; border: 1px dashed #ef4444; margin-top: 15px;">❌ Sai rồi! Nhìn lại đáp án đúng rồi bấm <b>❯</b> để đi tiếp nhé!</div>`;
                    } 
                    else {
                        autoNext = true;
                        msgHTML += `<div style="font-size:11px; font-weight:900; color:var(--primary); letter-spacing:1px; margin-top:15px;">TỰ ĐỘNG CHUYỂN CÂU...</div>
                                    <div style="width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:10px;margin-top:8px;overflow:hidden;">
                                        <div class="jump-bar-fill" id="fill-${i}" style="margin:0;"></div>
                                    </div>`;
                    }

                    l.innerHTML = msgHTML;

                    if (autoNext) {
                        let f = document.getElementById(`fill-${i}`);
                        let w = 100;
                        jumpTimer = setInterval(() => { 
                            w -= 4; if(f) f.style.width = w + '%'; 
                            if(w <= 0) { clearInterval(jumpTimer); findNextUnansweredOrEnd(i); } 
                        }, 80); 
                    }
                };
                oCont.appendChild(oDiv);
            });
            cont.appendChild(div);
        });
    }

    // TÌM CÂU CHƯA LÀM ĐỂ NHẢY TỚI (NẾU ĐÃ LÀM HẾT THÌ KẾT THÚC)
    function findNextUnansweredOrEnd(current) {
        if(done >= questions.length) {
            showEndScreen();
            return;
        }
        let nextIdx = -1;
        for(let j = current + 1; j < questions.length; j++) {
            if(questions[j].ans === null) { nextIdx = j; break; }
        }
        if(nextIdx === -1) {
            for(let j = 0; j < current; j++) {
                if(questions[j].ans === null) { nextIdx = j; break; }
            }
        }
        if(nextIdx !== -1) show(nextIdx);
    }

    function show(i) {
        if(synth.speaking) synth.cancel();
        document.querySelectorAll('.question-box').forEach(b => b.classList.remove('active'));
        if(document.getElementById('q-'+i)) document.getElementById('q-'+i).classList.add('active');
        document.querySelectorAll('.node').forEach(n => n.classList.remove('node-active'));
        if(document.getElementById('node-'+i)) {
            document.getElementById('node-'+i).classList.add('node-active');
            document.getElementById('node-'+i).scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        currentIdx = i;
        document.getElementById('nav-prev').style.display = i > 0 ? 'flex' : 'none';
        document.getElementById('nav-next').style.display = i < questions.length - 1 ? 'flex' : 'none';
    }

    function move(d) {
        if(jumpTimer) clearInterval(jumpTimer);
        let n = currentIdx + d; if(n >= 0 && n < questions.length) show(n);
    }

    function updateStats() {
        const p = Math.round((score / (done || 1)) * 100);
        const prog = (done / questions.length) * 100;
        
        document.getElementById('score-text').innerHTML = `Đã làm: ${done}/${questions.length} <br> Tỷ lệ đúng: ${p}%`;
        document.getElementById('progress-bar').style.width = prog + '%';
        document.getElementById('progress-percent-text').innerText = `TIẾN ĐỘ: ${Math.floor(prog)}%`;

        let current5Percent = Math.floor(prog / 5);
        if(current5Percent > lastLevel5Percent && prog > 0) {
            lastLevel5Percent = current5Percent;
            triggerLevelUpEffect(prog);
        }

        // Nếu người dùng tự dùng tay click chọn câu khác, kiểm tra đã xong chưa
        if(done >= questions.length && document.getElementById('q-'+currentIdx).querySelector('.option.correct')) {
            setTimeout(() => { showEndScreen(); }, 2000);
        }
    }

    function triggerLevelUpEffect(prog) {
        document.getElementById('universe').style.filter = `hue-rotate(${lastLevel5Percent * 25}deg)`;
        const themeKey = document.getElementById('theme-selector').value;
        const t = themes[themeKey];
        for(let i=0; i<25; i++) {
            const e = document.createElement('div');
            e.className = 'milestone-burst';
            e.innerText = t.obj[Math.floor(Math.random()*t.obj.length)];
            e.style.left = '50vw'; e.style.top = '50vh';
            e.style.setProperty('--tx', `${(Math.random() - 0.5) * 600}px`);
            e.style.setProperty('--ty', `${(Math.random() - 0.5) * 600}px`);
            document.body.appendChild(e);
            setTimeout(() => e.remove(), 1500);
        }
        const toast = document.getElementById('streak-toast'); 
        toast.innerText = `🌟 ĐẠT MỐC ${Math.floor(prog)}% 🌟`;
        toast.style.background = 'linear-gradient(45deg, #10b981, #059669)';
        toast.classList.add('show'); 
        setTimeout(() => { toast.classList.remove('show'); toast.style.background = 'linear-gradient(45deg, #ff0f7b, #f89b29)'; }, 2500);
    }

    function buildMap() {
        const g = document.getElementById('node-grid'); g.innerHTML = '';
        questions.forEach((_, i) => {
            const n = document.createElement('div'); n.className = 'node'; n.id = 'node-'+i; n.innerText = i+1;
            n.onclick = () => { move(i - currentIdx); toggleMap(); };
            g.appendChild(n);
        });
    }

    function updateNode(i) { document.getElementById('node-'+i).classList.add(questions[i].ans ? 'node-correct' : 'node-wrong'); }

    function showStreak() {
        const t = document.getElementById('streak-toast'); t.innerText = `🔥 COMBO x${streak}`;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
    }

    function showEndScreen() {
        const p = Math.round((score / questions.length) * 100);
        document.getElementById('final-score').innerText = p + '%';
        document.getElementById('final-rank').innerText = p === 100 ? "🏆 THỦ KHOA RHM" : (p >= 80 ? "🥇 CHUYÊN GIA" : "🥈 CẦN CỐ GẮNG");
        document.getElementById('end-screen').style.display = 'flex';

        if(p === 100) {
            const id = new URLSearchParams(window.location.search).get('id');
            localStorage.setItem('done_' + id, 'true');
        }
    }

    // BẢNG VÀNG BẢO MẬT (CHƯA LÀM THÌ KHÔNG LỘ ĐÁP ÁN)
    function showReviewMode() {
        document.getElementById('end-screen').style.display = 'none';
        
        document.getElementById('nav-prev').style.display = 'none';
        document.getElementById('nav-next').style.display = 'none';
        document.querySelector('.progress-bar-bg').style.display = 'none';
        document.getElementById('progress-percent-text').style.display = 'none';

        const cont = document.getElementById('quiz-container');
        cont.style.display = 'block';
        cont.style.height = 'calc(100vh - 70px)';
        cont.style.marginTop = '70px';
        cont.style.overflowY = 'auto';
        cont.style.padding = '20px 15px 100px 15px'; 
        
        cont.innerHTML = '<h2 style="text-align:center; color:var(--primary); font-weight:900; letter-spacing:1px; margin-bottom:30px;">📜 BẢNG VÀNG ÔN TẬP</h2>';

        questions.forEach((q, i) => {
            let box = document.createElement('div');
            box.className = 'question-box active'; 
            box.style.position = 'relative';
            box.style.marginBottom = '25px';
            box.style.margin = '0 auto 25px auto';
            box.style.animation = 'none'; 

            // Xử lý màu nhãn dán
            let statusColor = 'gray';
            let statusText = '⚠️ CHƯA LÀM';
            if(q.ans === true) { statusColor = '#10b981'; statusText = '✅ ĐÚNG'; }
            else if(q.ans === false) { statusColor = '#ef4444'; statusText = '❌ SAI'; }

            box.style.borderColor = statusColor;

            let html = `<div style="text-align:center; margin-bottom: 15px;">
                            <span style="background:rgba(255,255,255,0.1); color:${statusColor}; padding: 6px 15px; border-radius: 20px; font-weight: 900; font-size: 12px; border: 1px solid ${statusColor};">CÂU ${i+1} - ${statusText}</span>
                        </div>
                        <div class="question-title" style="font-size:${fontSize}px; font-weight:800; margin-bottom:20px; text-align:center;">${q.title}</div>
                        <div class="opts">`;

            q.opts.forEach((opt, oIdx) => {
                let optClass = 'option disabled';
                // NẾU ĐÃ LÀM MỚI BÔI MÀU
                if(q.userPick !== -1) {
                    if (opt.isC) optClass += ' correct';
                    else if (q.userPick === oIdx) optClass += ' wrong';
                }
                html += `<div class="${optClass}" style="margin-bottom:8px;">${opt.text}</div>`;
            });
            html += `</div>`;

            // NẾU ĐÃ LÀM VÀ CÓ GIẢI THÍCH THÌ HIỆN GIẢI THÍCH
            if (q.explanation && q.userPick !== -1) {
                html += `<div style="text-align:left; background: rgba(0,242,254,0.1); padding: 15px; border-radius: 12px; border: 1px solid var(--primary); margin-top: 15px; font-size: 14px;"><b>💡 Bổ sung / Giải thích:</b><br>${q.explanation}</div>`;
            } else if (q.userPick === -1) {
                html += `<div style="text-align:center; font-style:italic; color:gray; margin-top:10px;">(Hãy hoàn thành câu hỏi để xem đáp án đúng và giải thích)</div>`;
            }

            box.innerHTML = html;
            cont.appendChild(box);
        });
    }

    function changeTheme(v) {
        const t = themes[v]; document.documentElement.style.setProperty('--primary', t.p);
        document.getElementById('universe').style.background = t.bg;
        document.getElementById('universe').style.filter = `hue-rotate(0deg)`;
        
        const f = document.getElementById('floating-objects'); f.innerHTML = '';
        for(let i=0; i<12; i++) {
            const e = document.createElement('div'); e.className = 'emoji-floater';
            e.innerText = t.obj[Math.floor(Math.random()*t.obj.length)];
            e.style.left = Math.random()*90+'vw'; e.style.top = Math.random()*90+'vh';
            e.style.animationDuration = (15 + Math.random()*15) + 's';
            f.appendChild(e);
        }
    }

    function playSfx(isC) {
        if(!audioCtx) return; const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = isC ? 880 : 200; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }
</script>
