<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hạm Đội RHM - Phúc VIP 2027</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe; --primary-gradient: linear-gradient(90deg, #00f2fe, #4facfe);
            --bg-theme: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
        }
        [data-theme="dark"] { --bg-card: rgba(15, 23, 42, 0.85); --card-border: rgba(255, 255, 255, 0.15); --text-main: #f8fafc; --text-sub: #94a3b8; --option-bg: rgba(30, 41, 59, 0.8); --option-border: rgba(255,255,255,0.1); --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #10b981; --correct-text: #6ee7b7; --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #ef4444; --wrong-text: #fca5a5; --overlay-bg: rgba(0,0,0,0.9); --drawer-bg: rgba(15, 23, 42, 0.95); }
        [data-theme="light"] { --bg-card: rgba(255, 255, 255, 0.9); --card-border: rgba(0, 0, 0, 0.15); --text-main: #0f172a; --text-sub: #475569; --option-bg: rgba(241, 245, 249, 0.9); --option-border: rgba(0,0,0,0.15); --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #059669; --correct-text: #047857; --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #dc2626; --wrong-text: #b91c1c; --overlay-bg: rgba(255,255,255,0.9); --drawer-bg: rgba(255, 255, 255, 0.95); }

        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; background: #000; transition: color 0.3s ease; }
        #universe { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: var(--bg-theme); transition: filter 1s ease, background 1.5s ease; background-size: cover; background-position: center; }
        #floating-objects { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; overflow: hidden; }
        .emoji-floater { position: absolute; font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); animation: floatRandom 20s infinite linear alternate; opacity: 0.8; }
        @keyframes floatRandom { 0% { transform: translate(0, 0) rotate(0deg) scale(0.8); } 50% { transform: translate(100px, -100px) rotate(180deg) scale(1.2); } 100% { transform: translate(-50px, 150px) rotate(360deg) scale(0.9); } }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--overlay-bg); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease; backdrop-filter: blur(10px); }
        .neon-title { font-size: 34px; font-weight: 900; color: var(--text-main); text-align: center; line-height: 1.4; padding: 0 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--primary); animation: pulseNeon 1.5s infinite alternate; }
        @keyframes pulseNeon { 100% { text-shadow: 0 0 25px var(--primary); transform: scale(1.02); } }
        .start-btn { margin-top: 40px; padding: 18px 50px; font-size: 18px; font-weight: 900; color: #000; background: var(--primary-gradient); border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px var(--primary); text-transform: uppercase; }

        /* HEADER */
        .sticky-header { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, var(--overlay-bg), transparent); padding: 15px 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; width: 100%; }
        .header-top h1 { margin: 0; font-size: 18px; font-weight: 900; color: var(--text-main); text-shadow: 0 0 10px var(--primary); display: flex; align-items: center; gap: 10px; }
        .back-btn-top { background: var(--option-bg); color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 15px; font-size: 11px; text-decoration: none; font-weight: bold; }
        .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-tool { background: var(--option-bg); border: 1px solid var(--primary); color: var(--text-main); font-weight: 700; font-size: 12px; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .score-badge { background: var(--option-bg); color: #facc15; padding: 6px 12px; border-radius: 15px; font-weight: 900; font-size: 13px; border: 1px solid #facc15; }

        /* PROGRESS */
        .progress-container { width: 100%; position: absolute; bottom: 0; left: 0; background-color: rgba(255,255,255,0.1); height: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--primary); }

        /* QUIZ */
        #quiz-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .question-box { position: absolute; width: 92%; max-width: 700px; max-height: 75vh; overflow-y: auto; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--card-border); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: none; color: var(--text-main); }
        .question-box.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
        .question-number { text-align: center; font-size: 13px; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .question-title { font-weight: 800; font-size: 18px; margin-bottom: 25px; line-height: 1.6; text-align: center; }
        .option { position: relative; padding: 14px 18px; margin-bottom: 10px; background: var(--option-bg); border: 2px solid var(--option-border); border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 15px; transition: 0.2s; }
        .option:hover { border-color: var(--primary); transform: translateX(5px); }
        .correct { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text) !important; }
        .incorrect { background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color: var(--wrong-text) !important; animation: shake 0.3s; }
        .disabled { pointer-events: none; opacity: 0.8; }
        @keyframes fadeIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }

        /* MAP DRAWER */
        #map-drawer { position: fixed; top: 0; right: -340px; width: 300px; height: 100vh; background: var(--drawer-bg); border-left: 2px solid var(--primary); z-index: 9999; transition: 0.4s; padding: 20px; box-sizing: border-box; }
        #map-drawer.open { right: 0; }
        .node-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; overflow-y: auto; max-height: 80vh; }
        .node { aspect-ratio: 1; border-radius: 8px; background: var(--option-bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; cursor: pointer; border: 1px solid var(--option-border); }
        .node-correct { background: var(--correct-border); color: #000; }
        .node-wrong { background: var(--wrong-border); color: #fff; }
        .node-active { border: 2px solid var(--primary); transform: scale(1.15); box-shadow: 0 0 10px var(--primary); }

        /* 3D BUILDER */
        #builder-widget { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); border: 2px solid var(--primary); border-radius: 20px; padding: 15px; width: 120px; text-align: center; z-index: 1000; }
        .house-part-3d { width: 40px; height: 40px; background: #334155; margin: 5px auto; border-radius: 5px; opacity: 0.2; transition: 0.5s; }
        .built { opacity: 1; background: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* NAV & DONATE */
        .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: var(--option-bg); border: 2px solid var(--primary); color: var(--primary); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; z-index: 1050; }
        #nav-prev { left: 15px; } #nav-next { right: 15px; }
        .donate-badge { position: fixed; bottom: 20px; left: 20px; background: var(--bg-card); border: 1px solid #ff00de; color: var(--text-main); padding: 12px 18px; border-radius: 15px; font-size: 13px; font-weight: 700; z-index: 1000; cursor: pointer; display: flex; align-items: center; gap: 8px;}
        .donate-badge b { color: #ff00de; font-size: 15px; font-weight: 900; }

        /* END SCREEN */
        #end-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .end-box { background: var(--bg-card); border: 2px solid var(--primary); border-radius: 30px; padding: 40px; text-align: center; max-width: 500px; width: 90%; }
        .btn-end { width: 100%; padding: 15px; margin: 5px 0; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .jump-loader { display: none; margin-top: 15px; text-align: center; }
        .jump-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .jump-bar-fill { height: 100%; background: var(--primary); width: 100%; }
        #streak-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) scale(0); background: linear-gradient(45deg, #ff0f7b, #f89b29); color: #fff; padding: 10px 25px; border-radius: 30px; font-weight: 900; z-index: 9999; transition: 0.3s; }
        #streak-toast.show { transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

<div id="universe"></div>
<div id="floating-objects"></div>
<div id="streak-toast">🔥 COMBO x3</div>

<div id="splash-screen">
    <div class="neon-title">ĐA VŨ TRỤ RHM<br>HẠM ĐỘI PHÚC VIP 🚀</div>
    <button class="start-btn" onclick="startApp()">🚀 BẮT ĐẦU CHIẾN!</button>
</div>

<div id="main-app" style="display: none;">
    <div class="sticky-header">
        <div class="header-top">
            <h1 id="app-title">
                <a href="index.html" class="back-btn-top">⬅ THOÁT</a>
                <span>BỘ ĐỀ RHM</span>
            </h1>
            <div class="header-controls">
                <div class="score-badge" id="score-text">Đúng: 0%</div>
                <button class="btn-tool" onclick="adjSize(2)">A+</button>
                <button class="btn-tool" onclick="adjSize(-2)">A-</button>
                <select id="voice-select" class="btn-tool" style="max-width: 100px;"></select>
                <button class="btn-tool" style="background:#ff00de; color:#fff;" onclick="speak()">🔊 ĐỌC</button>
                <select class="btn-tool" id="theme-selector" onchange="changeTheme(this.value)">
                    <option value="space">🌌 Vũ Trụ</option>
                    <option value="love">💖 Tình Yêu</option>
                    <option value="spring">🌸 Mùa Xuân</option>
                    <option value="summer">🌻 Mùa Hạ</option>
                    <option value="autumn">🍁 Mùa Thu</option>
                    <option value="winter">❄️ Mùa Đông</option>
                    <option value="nature">🌿 Thiên Nhiên</option>
                    <option value="animals">🐾 Động Vật</option>
                    <option value="cyberpunk">⚡ Cyberpunk</option>
                </select>
                <button class="btn-tool" onclick="toggleMode()">🌓</button>
                <button class="btn-tool" onclick="toggleMap()">🗺️ MAP</button>
            </div>
        </div>
        <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    </div>

    <div id="quiz-container"></div>

    <div id="nav-prev" class="nav-arrow" onclick="move(-1)" style="display:none;">&lt;</div>
    <div id="nav-next" class="nav-arrow" onclick="move(1)" style="display:none;">&gt;</div>

    <div id="map-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 style="margin:0; color:var(--primary);">TIẾN ĐỘ</h3>
            <button onclick="toggleMap()" style="background:none; border:none; color:#ef4444; font-size:24px; cursor:pointer;">&times;</button>
        </div>
        <div class="node-grid" id="node-grid"></div>
    </div>

    <div id="builder-widget">
        <div style="font-size:10px; font-weight:800; margin-bottom:5px;">CÔNG TRÌNH</div>
        <div id="hp-1" class="house-part-3d"></div>
        <div id="hp-2" class="house-part-3d"></div>
        <div id="hp-3" class="house-part-3d"></div>
        <div id="build-status" style="font-size:9px; color:var(--primary);">CHỜ KHỞI CÔNG</div>
    </div>

    <div class="donate-badge" onclick="copySTK()">
        💖 Donate Phúc: <b>BIDV 8812766209</b>
    </div>
</div>

<div id="end-screen">
    <div class="end-box">
        <h2 class="end-title">HOÀN THÀNH CHIẾN DỊCH!</h2>
        <div style="font-size: 60px; font-weight: 900;" id="final-score">100%</div>
        <div id="final-rank" style="color: #facc15; font-weight: 800; margin-bottom: 20px;">THỦ KHOA RHM</div>
        <button class="btn-end" style="background:#10b981; color:#fff;" onclick="closeEndScreen()">Xem lại bài</button>
        <button class="btn-end" style="background:var(--primary-gradient); color:#000;" onclick="initGame('wrong')">Làm lại câu sai</button>
        <button class="btn-end" style="background:#fff; color:#000;" onclick="initGame('all')">Làm lại từ đầu</button>
    </div>
</div>

<script src="KhoDuLieu.js"></script>
<script>
    let originalQuestions = []; let questions = [];
    let currentIdx = 0; let score = 0; let done = 0;
    let streak = 0; let jumpTimer = null; let fontSize = 18;
    let audioCtx = null; let synth = window.speechSynthesis;

    const themes = {
        space: { bg: 'radial-gradient(circle at center, #1e1b4b 0%, #020617 100%)', p: '#00f2fe', obj: ['🛸','🚀','🌌'] },
        love: { bg: 'radial-gradient(circle at center, #43000b 0%, #1a0004 100%)', p: '#ff0844', obj: ['💖','🌹','💌'] },
        spring: { bg: 'linear-gradient(to bottom, #2e1437, #943b54)', p: '#ff7eb3', obj: ['🌸','🦋','🌷'] },
        summer: { bg: 'linear-gradient(to bottom, #001d3d, #00b4db)', p: '#f6d365', obj: ['🌻','☀️','🍉'] },
        autumn: { bg: 'linear-gradient(to bottom, #3f2b96, #a8c0ff)', p: '#ff9966', obj: ['🍁','🍂','🦊'] },
        winter: { bg: 'linear-gradient(to bottom, #141e30, #243b55)', p: '#a1c4fd', obj: ['❄️','⛄','🐧'] },
        nature: { bg: 'linear-gradient(to bottom, #0f2027, #203a43)', p: '#11998e', obj: ['🌲','🏔️','🍀'] },
        animals: { bg: 'linear-gradient(to bottom, #134e5e, #71b280)', p: '#20b2aa', obj: ['🐼','🦁','🐘'] },
        cyberpunk: { bg: 'radial-gradient(circle at center, #0f0c29, #302b63, #24243e)', p: '#bc13fe', obj: ['💻','⚡','🤖'] }
    };

    function startApp() {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }

    function copySTK() { navigator.clipboard.writeText('8812766209'); alert("Đã copy STK Phúc Đẹp Trai!"); }
    function toggleMode() { const h = document.documentElement; h.setAttribute('data-theme', h.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    function toggleMap() { document.getElementById('map-drawer').classList.toggle('open'); }
    function adjSize(v) { fontSize += v; document.querySelectorAll('.question-title').forEach(e => e.style.fontSize = fontSize + 'px'); }

    function populateVoices() {
        let voices = synth.getVoices().filter(v => v.lang.includes('vi'));
        const sel = document.getElementById('voice-select');
        sel.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name.substring(0,10)}</option>`).join('');
    }
    populateVoices(); if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;

    function speak() {
        if (synth.speaking) { synth.cancel(); return; }
        let q = questions[currentIdx];
        let text = q.title.replace(/<[^>]*>?/gm, '') + ". ";
        q.opts.forEach((o, i) => text += `Đáp án ${i+1}: ${o.text.replace(/<[^>]*>?/gm, '')}. `);
        let utter = new SpeechSynthesisUtterance(text);
        utter.voice = synth.getVoices().filter(v => v.lang.includes('vi'))[document.getElementById('voice-select').value];
        synth.speak(utter);
    }

    window.onload = function() {
        const id = new URLSearchParams(window.location.search).get('id');
        if(!id || !KHO_DE_THI[id]) { location.href='index.html'; return; }
        document.querySelector('#app-title span').innerText = KHO_DE_THI[id].tenDe;
        
        KHO_DE_THI[id].noiDung.split('\n').forEach(line => {
            line = line.trim(); if(!line) return;
            if(line.match(/^Câu\s*\d+:/i)) {
                originalQuestions.push({ title: line.replace(/^Câu\s*\d+:/i, '').trim(), opts: [], ans: null });
            } else if(line.startsWith('*')) {
                originalQuestions[originalQuestions.length-1].opts.push({ text: line.substring(1).trim(), isC: true });
            } else if(line.startsWith('•')) {
                originalQuestions[originalQuestions.length-1].opts.push({ text: line.substring(1).trim(), isC: false });
            } else if(originalQuestions.length > 0 && originalQuestions[originalQuestions.length-1].opts.length === 0) {
                originalQuestions[originalQuestions.length-1].title += "<br>" + line;
            }
        });
        initGame('all');
        changeTheme('space');
    };

    function initGame(mode) {
        if(jumpTimer) clearInterval(jumpTimer);
        document.getElementById('end-screen').style.display = 'none';
        if(mode === 'all') questions = JSON.parse(JSON.stringify(originalQuestions));
        else questions = questions.filter(x => x.ans === false);
        questions.forEach(q => q.ans = null);
        currentIdx = 0; score = 0; done = 0; streak = 0;
        document.getElementById('quiz-container').innerHTML = '';
        render(); buildMap(); show(0); updateStats();
    }

    function render() {
        const cont = document.getElementById('quiz-container');
        questions.forEach((q, i) => {
            const div = document.createElement('div'); div.className = 'question-box'; div.id = 'q-'+i;
            div.innerHTML = `<span class="question-number">CÂU ${i+1} / ${questions.length}</span>
                <div class="question-title" style="font-size:${fontSize}px">${q.title}</div>
                <div class="opts-cont"></div>
                <div class="jump-loader" id="loader-${i}">
                    <div style="font-size:10px; font-weight:800;">ĐANG CHUYỂN CÂU...</div>
                    <div class="jump-bar-bg"><div class="jump-bar-fill" id="fill-${i}"></div></div>
                </div>`;
            q.opts.forEach((opt, oIdx) => {
                const oDiv = document.createElement('div'); oDiv.className = 'option'; oDiv.innerHTML = opt.text;
                oDiv.onclick = function() {
                    if(q.ans !== null) return;
                    q.ans = opt.isC; done++;
                    Array.from(div.querySelector('.opts-cont').children).forEach(c => c.classList.add('disabled'));
                    if(opt.isC) { this.classList.add('correct'); score++; streak++; playSfx(true); if(streak >= 3) showStreak(); }
                    else { this.classList.add('wrong'); streak = 0; playSfx(false); Array.from(div.querySelector('.opts-cont').children).forEach((c, x) => { if(q.opts[x].isC) c.classList.add('correct'); }); }
                    updateStats(); updateNode(i); startJump(i);
                };
                div.querySelector('.opts-cont').appendChild(oDiv);
            });
            cont.appendChild(div);
        });
    }

    function show(i) {
        document.querySelectorAll('.question-box').forEach(b => b.classList.remove('active'));
        document.getElementById('q-'+i).classList.add('active');
        document.querySelectorAll('.node').forEach(n => n.classList.remove('node-active'));
        document.getElementById('node-'+i).classList.add('node-active');
        currentIdx = i;
        document.getElementById('nav-prev').style.display = i > 0 ? 'flex' : 'none';
        document.getElementById('nav-next').style.display = i < questions.length - 1 ? 'flex' : 'none';
    }

    function move(d) { let n = currentIdx + d; if(n >= 0 && n < questions.length) show(n); }

    function startJump(i) {
        if(i >= questions.length - 1) { setTimeout(showEndScreen, 1500); return; }
        const f = document.getElementById(`fill-${i}`); document.getElementById(`loader-${i}`).style.display = 'block';
        let w = 100; jumpTimer = setInterval(() => { w -= 5; f.style.width = w + '%'; if(w <= 0) { clearInterval(jumpTimer); move(1); } }, 50);
    }

    function updateStats() {
        const p = Math.round((score / (done || 1)) * 100);
        document.getElementById('score-text').innerText = `Đúng: ${p}%`;
        const prog = (done / questions.length) * 100;
        document.getElementById('progress-bar').style.width = prog + '%';
        if(prog > 0) document.getElementById('hp-1').classList.add('built');
        if(prog >= 50) document.getElementById('hp-2').classList.add('built');
        if(prog === 100) { document.getElementById('hp-3').classList.add('built'); document.getElementById('build-status').innerText = "HOÀN THÀNH! 🚀"; }
    }

    function buildMap() {
        const grid = document.getElementById('node-grid'); grid.innerHTML = '';
        questions.forEach((_, i) => {
            const n = document.createElement('div'); n.className = 'node'; n.id = 'node-'+i; n.innerText = i+1;
            n.onclick = () => { show(i); toggleMap(); };
            grid.appendChild(n);
        });
    }

    function updateNode(i) { document.getElementById('node-'+i).classList.add(questions[i].ans ? 'node-correct' : 'node-wrong'); }

    function showStreak() {
        const t = document.getElementById('streak-toast'); t.innerText = `🔥 COMBO x${streak}`;
        t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000);
    }

    function showEndScreen() {
        const p = Math.round((score / questions.length) * 100);
        document.getElementById('final-score').innerText = p + '%';
        let r = p === 100 ? "🏆 THỦ KHOA RHM" : (p >= 80 ? "🥇 CHUYÊN GIA" : "🥈 CẦN CỐ GẮNG");
        document.getElementById('final-rank').innerText = r;
        document.getElementById('end-screen').style.display = 'flex';
    }

    function closeEndScreen() { document.getElementById('end-screen').style.display = 'none'; }

    function changeTheme(v) {
        const t = themes[v]; document.documentElement.style.setProperty('--primary', t.p);
        document.getElementById('universe').style.background = t.bg;
        const f = document.getElementById('floating-objects'); f.innerHTML = '';
        for(let i=0; i<12; i++) {
            const e = document.createElement('div'); e.className = 'emoji-floater';
            e.innerText = t.obj[Math.floor(Math.random()*t.obj.length)];
            e.style.left = Math.random()*90+'vw'; e.style.top = Math.random()*90+'vh';
            e.style.animationDuration = (15 + Math.random()*15) + 's';
            f.appendChild(e);
        }
    }

    function playSfx(isC) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = isC ? 880 : 200; g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        o.start(); o.stop(audioCtx.currentTime + 0.2);
    }
</script>
