<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phòng Thi VIP - Phúc Đẹp Trai</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #00f2fe; --primary-gradient: linear-gradient(90deg, #00f2fe, #4facfe);
      --bg-theme: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
    }

    [data-theme="dark"] {
      --bg-card: rgba(15, 23, 42, 0.85); --card-border: rgba(255, 255, 255, 0.15);
      --text-main: #f8fafc; --text-sub: #94a3b8; 
      --option-bg: rgba(30, 41, 59, 0.8); --option-border: rgba(255,255,255,0.1);
      --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #10b981; --correct-text: #6ee7b7;
      --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #ef4444; --wrong-text: #fca5a5;
      --overlay-bg: rgba(0,0,0,0.9); --drawer-bg: rgba(15, 23, 42, 0.95);
    }

    [data-theme="light"] {
      --bg-card: rgba(255, 255, 255, 0.9); --card-border: rgba(0, 0, 0, 0.15);
      --text-main: #0f172a; --text-sub: #475569; 
      --option-bg: rgba(241, 245, 249, 0.9); --option-border: rgba(0,0,0,0.15);
      --correct-bg: rgba(16, 185, 129, 0.2); --correct-border: #059669; --correct-text: #047857;
      --wrong-bg: rgba(239, 68, 68, 0.2); --wrong-border: #dc2626; --wrong-text: #b91c1c;
      --overlay-bg: rgba(255,255,255,0.9); --drawer-bg: rgba(255, 255, 255, 0.95);
    }

    body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); margin: 0; padding: 0; overflow: hidden; height: 100vh; width: 100vw; background: #000; transition: color 0.3s ease; }
    #universe { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: var(--bg-theme); transition: filter 1s ease, background 1.5s ease; background-size: cover; background-position: center; }
    #universe::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.3); opacity: 0; transition: opacity 0.5s; pointer-events: none; }
    [data-theme="light"] #universe::after { opacity: 1; }

    #floating-objects { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2; pointer-events: none; overflow: hidden; }
    .emoji-floater { position: absolute; font-size: 40px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); animation: floatRandom 20s infinite linear alternate; opacity: 0.8; }
    @keyframes floatRandom { 0% { transform: translate(0, 0) rotate(0deg) scale(0.8); } 50% { transform: translate(100px, -100px) rotate(180deg) scale(1.2); } 100% { transform: translate(-50px, 150px) rotate(360deg) scale(0.9); } }

    #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--overlay-bg); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.5s ease; backdrop-filter: blur(10px); }
    .neon-title { font-size: 34px; font-weight: 900; color: var(--text-main); text-align: center; line-height: 1.4; padding: 0 20px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 15px var(--primary); animation: pulseNeon 1.5s infinite alternate; }
    @keyframes pulseNeon { 100% { text-shadow: 0 0 25px var(--primary), 0 0 50px var(--primary); transform: scale(1.02); } }
    .start-btn { margin-top: 40px; padding: 18px 50px; font-size: 18px; font-weight: 900; color: #000; background: var(--primary-gradient); background-size: 200% auto; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px var(--primary); animation: gradientMove 3s linear infinite, bounceIn 2s infinite alternate; text-transform: uppercase; }

    .sticky-header { position: absolute; top: 0; left: 0; width: 100%; box-sizing: border-box; background: linear-gradient(to bottom, var(--overlay-bg), transparent); padding: 15px 20px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .header-top h1 { margin: 0; font-size: 20px; font-weight: 900; color: var(--text-main); text-shadow: 0 0 10px var(--primary); letter-spacing: 1px; display: flex; align-items: center; gap: 15px;}
    .back-btn-top { background: var(--option-bg); color: var(--primary); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 15px; font-size: 12px; text-decoration: none; font-weight: bold; transition: 0.2s;}
    .back-btn-top:hover { background: var(--primary); color: #000; }
    
    .header-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .theme-selector { background: var(--option-bg); border: 1px solid var(--primary); color: var(--text-main); font-family: inherit; font-weight: 700; font-size: 13px; padding: 8px 12px; border-radius: 20px; cursor: pointer; outline: none; transition: 0.3s; }
    .theme-selector:hover { background: var(--primary); color: #000; }
    .theme-selector option { background: var(--bg-card); color: var(--text-main); }
    .btn-action { background: var(--primary-gradient); border: none; color: #000; font-weight: 900; font-size: 13px; padding: 8px 15px; border-radius: 20px; cursor: pointer; box-shadow: 0 0 10px var(--primary); transition: 0.2s; text-transform: uppercase;}
    .btn-action:hover { transform: scale(1.05); filter: brightness(1.2); }
    .btn-speak { background: #ff00de; color: #fff; box-shadow: 0 0 10px #ff00de; }
    .mode-toggle { background: var(--option-bg); border: 1px solid var(--primary); font-size: 16px; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
    
    .stats { display: flex; gap: 10px; font-weight: 800; font-size: 13px; align-items: center;}
    .stat-item { background: var(--option-bg); padding: 6px 12px; border-radius: 15px; border: 1px solid var(--option-border); color: var(--text-main); }
    #timer-text { color: #facc15; border-color: #facc15; }
    .progress-container { width: 100%; background-color: rgba(255,255,255,0.2); border-radius: 10px; height: 5px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary-gradient); width: 0%; transition: width 0.3s; }

    /* NÚT DONATE */
    .donate-badge { position: fixed; bottom: 20px; left: 20px; background: var(--bg-card); backdrop-filter: blur(10px); border: 1px solid #ff00de; color: var(--text-main); padding: 12px 18px; border-radius: 15px; font-size: 13px; font-weight: 700; z-index: 1000; box-shadow: 0 5px 15px rgba(255,0,222,0.2); transition: 0.3s; cursor: pointer; display: flex; align-items: center; gap: 8px;}
    .donate-badge b { color: #ff00de; font-size: 15px; font-weight: 900; letter-spacing: 0.5px;}
    .donate-badge:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,0,222,0.5); }
    
    @media (max-width: 768px) { 
      .nav-arrow { top: auto; bottom: 30px; transform: none; width: 45px; height: 45px; } #nav-prev { left: 15px; } #nav-next { right: 15px; }
      .donate-badge { bottom: 85px; left: 50%; transform: translateX(-50%); font-size: 11px; padding: 10px; width: max-content;}
      .donate-badge b { font-size: 12px; } .donate-badge:hover { transform: translateX(-50%) translateY(-3px); }
    }

    #question-map-drawer { position: fixed; top: 0; right: -400px; width: 340px; max-width: 90vw; height: 100vh; background: var(--drawer-bg); backdrop-filter: blur(20px); border-left: 2px solid var(--primary); box-shadow: -10px 0 40px rgba(0,0,0,0.5); z-index: 9999; transition: right 0.4s ease; display: flex; flex-direction: column; }
    #question-map-drawer.open { right: 0; }
    .drawer-header { padding: 20px; border-bottom: 1px solid var(--option-border); display: flex; justify-content: space-between; align-items: center; }
    .drawer-header h2 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 900; text-transform: uppercase; }
    .close-drawer-btn { background: transparent; border: none; color: #ef4444; font-size: 28px; font-weight: 900; cursor: pointer; transition: 0.2s; }
    .map-grid-container { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 10px; align-content: start; }
    .node { width: 100%; aspect-ratio: 1; border-radius: 12px; background: var(--option-bg); border: 2px solid var(--option-border); display: flex; align-items: center; justify-content: center; color: var(--text-main); font-weight: 800; font-size: 13px; cursor: pointer; transition: 0.2s; }
    .node-correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-border); }
    .node-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-border); }
    .node-active { border-color: var(--primary) !important; background: var(--primary) !important; color: #000; transform: scale(1.15); box-shadow: 0 0 15px var(--primary) !important; z-index: 10; }

    #review-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--drawer-bg); z-index: 10000; display: none; flex-direction: column; backdrop-filter: blur(20px); }
    .review-header { padding: 20px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: var(--option-bg); }
    .review-header h2 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 900; text-transform: uppercase; }
    .review-content { flex: 1; overflow-y: auto; padding: 30px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
    .review-item { background: var(--bg-card); border: 1px solid var(--card-border); padding: 25px; border-radius: 20px; margin-bottom: 25px; position: relative; }
    .review-q-title { font-size: 18px; font-weight: 800; line-height: 1.5; margin-bottom: 15px; color: var(--text-main); }
    .review-opt { padding: 12px 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--option-border); background: var(--option-bg); font-weight: 600; font-size: 15px; color: var(--text-main);}
    .review-opt.is-correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); box-shadow: inset 0 0 10px rgba(16,185,129,0.2); }
    .review-opt.is-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--wrong-text); text-decoration: line-through; }

    #quiz-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .question-box { position: absolute; width: 90%; max-width: 700px; max-height: 75vh; overflow-y: auto; background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--card-border); padding: 35px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); display: none; color: var(--text-main); }
    .question-box::-webkit-scrollbar { width: 6px; } .question-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    .question-box.active { display: block; animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(15px) scale(0.98); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .question-number { text-align: center; font-size: 15px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; display: block; }
    .question-title { font-weight: 800; font-size: 19px; margin-bottom: 30px; line-height: 1.6; text-align: center; }
    .option { position: relative; display: flex; align-items: center; padding: 16px 20px; margin-bottom: 12px; background: var(--option-bg); border: 2px solid var(--option-border); border-radius: 16px; cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.2s; }
    .option:hover { border-color: var(--primary); background: var(--bg-card); transform: translateX(5px); }
    .correct { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text) !important; }
    .incorrect { background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color: var(--wrong-text) !important; animation: shake 0.3s; }
    .disabled { pointer-events: none; opacity: 0.8; }

    .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: var(--option-bg); border: 2px solid var(--primary); color: var(--primary); width: 50px; height: 50px; border-radius: 50%; font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1050; transition: 0.2s; backdrop-filter: blur(5px); }
    .nav-arrow:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); transform: translateY(-50%) scale(1.1); }
    #nav-prev { left: 20px; } #nav-next { right: 20px; }

    .jump-loader-container { display: none; margin-top: 25px; text-align: center; }
    .jump-text { font-size: 12px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; margin-bottom: 8px; }
    .jump-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
    .jump-bar-fill { height: 100%; background: var(--primary-gradient); width: 100%; }

    #builder-widget { position: fixed; bottom: 20px; right: 20px; background: var(--bg-card); backdrop-filter: blur(10px); border: 2px solid var(--primary); border-radius: 20px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 1000; text-align: center; width: 130px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: 0.3s; }
    .widget-title { font-size: 11px; font-weight: 900; color: var(--primary); text-transform: uppercase; }
    #build-status { font-size: 10px; font-weight: 800; color: var(--text-main); background: var(--option-bg); padding: 4px 10px; border-radius: 10px; width: 90%; border: 1px solid var(--option-border);}
    #house-3d-container { width: 70px; height: 70px; position: relative; transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); transform-style: preserve-3d; }
    .house-part-3d { position: absolute; opacity: 0; transition: 0.5s ease; background: #cbd5e1;}
    .house-part-3d.built { opacity: 1; }
    #hp-3d-1 { width: 60px; height: 60px; background: #334155; top: 5px; left: 5px; transform: translateZ(-5px); }
    #hp-3d-2 { width: 40px; height: 35px; top: 15px; left: 15px; transform: rotateX(-90deg) translateZ(15px); border: 1px solid #94a3b8; }
    #hp-3d-3 { width: 40px; height: 35px; background: #94a3b8; top: 15px; left: 15px; transform: rotateY(90deg) translateZ(15px) rotateX(-90deg); border: 1px solid #64748b; }
    #hp-3d-4 { width: 15px; height: 25px; background: var(--primary); top: 25px; left: 15px; transform: rotateX(-90deg) translateZ(16px); }
    #hp-3d-6 { width: 50px; height: 35px; background: #475569; top: 10px; left: 10px; transform: translateZ(30px) rotateY(-45deg); }
    #hp-3d-7 { width: 50px; height: 35px; background: #64748b; top: 10px; left: 30px; transform: translateZ(30px) rotateY(45deg); }

    .particle { position: fixed; width: 8px; height: 8px; border-radius: 50%; pointer-events: none; z-index: 9999; animation: explode 0.6s ease-out forwards; }
    @keyframes explode { 0% { transform: translate(0, 0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }
  </style>
</head>

  <div id="splash-screen">

    <button class="start-btn" onclick="startApp()">🚀 BẮT ĐẦU CHIẾN!</button>
  </div>

  <div id="main-app" style="display: none;">
    <div class="sticky-header">
      <div class="header-top">
        <h1 id="app-title">
          <a href="index.html" class="back-btn-top">⬅ THOÁT</a>
          <span>BỘ ĐỀ RHM</span>
        </h1>
        <div class="header-controls">
          <select id="voice-select" class="theme-selector" style="max-width: 120px;" title="Chọn giọng đọc"></select>
          <button class="btn-action btn-speak" onclick="speakCurrentQuestion()" id="btn-speak">🔊 ĐỌC CÂU HỎI</button>
          
          <select class="theme-selector" id="theme-selector" onchange="changeTheme(this.value)">
            <option value="space">🌌 Vũ Trụ</option>
            <option value="spring">🌸 Mùa Xuân</option>

          </select>

        </div>
      </div>
      <div class="stats">
        <div class="stat-item" id="timer-text">⏳ 90:00</div>
        <div class="stat-item" id="score-text">Đúng: 0%</div>
      </div>
      <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    </div>

    <div id="question-map-drawer">
      <div class="drawer-header">
        <h2>Tiến Độ Bài Làm</h2>
        <button class="close-drawer-btn" onclick="toggleMapDrawer()">×</button>
      </div>
      <div class="map-grid-container" id="map-grid-container"></div>
    </div>

    <div id="review-modal">
      <div class="review-header">
        <h2>📖 XEM LẠI TOÀN BỘ CÂU HỎI</h2>
        <button class="close-drawer-btn" onclick="closeReviewMode()">ĐÓNG [X]</button>
      </div>
      <div class="review-content" id="review-content"></div>
    </div>

    <div id="quiz-container"></div>

      <div class="widget-title">Công Trình</div>
      <div id="house-3d-container">
        <div id="hp-3d-1" class="house-part-3d"></div> <div id="hp-3d-2" class="house-part-3d"></div> 
        <div id="hp-3d-3" class="house-part-3d"></div> <div id="hp-3d-4" class="house-part-3d"></div> 
        <div id="hp-3d-6" class="house-part-3d"></div> <div id="hp-3d-7" class="house-part-3d"></div> 
      </div>
      <div id="build-status">Chờ khởi công...</div>
    </div>
  </div>

  <script src="KhoDuLieu.js"></script>

  <script>
    let audioCtx = null;
    let allQuestions = [];      
    let activeIndex = 0; 
    let answeredQuestions = 0; let correctAnswers = 0; 
    let timerInterval; let timeRemaining = 90 * 60; 
    let jumpTimer = null; 
    let currentLevel5Percent = 0; 
    let currentThemeKey = 'space';

    // --- HỆ THỐNG ĐỌC CÂU HỎI (TEXT-TO-SPEECH) ---
    let synth = window.speechSynthesis;
    let viVoices = [];

    function populateVoiceList() {
      viVoices = synth.getVoices().filter(v => v.lang.includes('vi'));
      const voiceSelect = document.getElementById('voice-select');
      voiceSelect.innerHTML = '';
      if(viVoices.length === 0) {
        voiceSelect.innerHTML = '<option value="">Không có giọng VN</option>';
        return;
      }
      viVoices.forEach((voice, i) => {
        const option = document.createElement('option');
        option.textContent = voice.name.replace('Vietnamese', 'VN'); // Rút gọn tên cho đẹp
        option.value = i;
        voiceSelect.appendChild(option);
      });
    }
    
    populateVoiceList();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    function speakCurrentQuestion() {
      const btn = document.getElementById('btn-speak');
      if (synth.speaking) { 
        synth.cancel(); 
        btn.innerHTML = "🔊 ĐỌC CÂU HỎI";
        btn.style.background = "#ff00de";
        return; 
      }
      
      const q = allQuestions[activeIndex];
      if(!q) return;
      
      // Xóa các thẻ HTML (như <img>, <br>) để máy chỉ đọc chữ
      let rawTitle = q.title.replace(/<[^>]*>?/gm, ''); 
      let textToRead = "Câu " + (activeIndex + 1) + ". " + rawTitle + ". ";
      
      q.options.forEach((opt, idx) => {
        let rawOpt = opt.text.replace(/<[^>]*>?/gm, '');
        textToRead += "Đáp án " + (idx+1) + ": " + rawOpt + ". ";
      });

      const utterThis = new SpeechSynthesisUtterance(textToRead);
      const voiceSelect = document.getElementById('voice-select');
      if(viVoices.length > 0 && voiceSelect.value !== '') {
        utterThis.voice = viVoices[voiceSelect.value];
      }
      utterThis.rate = 0.95; // Tốc độ đọc vừa phải
      
      utterThis.onend = function() {
        btn.innerHTML = "🔊 ĐỌC CÂU HỎI";
        btn.style.background = "#ff00de";
      }

      synth.speak(utterThis);
      btn.innerHTML = "⏸ DỪNG ĐỌC";
      btn.style.background = "#ef4444";
    }

    function copySTK() {
      navigator.clipboard.writeText('8812766209');
      alert("Cảm ơn sếp! Đã copy STK Phúc Đẹp Trai: 8812766209");
    }

    function toggleLightDarkMode() {
      const html = document.documentElement;
      const btn = document.getElementById('mode-icon');
      if (html.getAttribute('data-theme') === 'dark') {
        html.setAttribute('data-theme', 'light'); btn.innerText = '☀️';
      } else {
        html.setAttribute('data-theme', 'dark'); btn.innerText = '🌙';
      }
    }

    const themes = {
      space:   { bg: 'radial-gradient(circle at center, #1e1b4b 0%, #020617 100%)', p: '#00f2fe', obj: ['🛸', '👽', '🚀'] },
      spring:  { bg: 'linear-gradient(to bottom, #2e1437, #943b54)', p: '#ff7eb3', obj: ['🌸', '🦋'] },
      love:    { bg: 'linear-gradient(to bottom, #43000b, #ff0f7b)', p: '#ff0844', obj: ['💖', '💌'] }
    };

    function changeTheme(themeKey) {
      currentThemeKey = themeKey; const t = themes[themeKey];
      document.documentElement.style.setProperty('--bg-theme', t.bg);
      document.documentElement.style.setProperty('--primary', t.p);
      document.getElementById('universe').style.filter = 'hue-rotate(0deg)';
      document.getElementById('floating-objects').innerHTML = '';
      currentLevel5Percent = 0; 
      const p = allQuestions.length === 0 ? 0 : Math.floor((answeredQuestions / allQuestions.length) * 100);
      for(let i=0; i<Math.floor(p/5); i++) spawnThemeObject();
    }

    function spawnThemeObject() {
      const t = themes[currentThemeKey]; const obj = t.obj[Math.floor(Math.random() * t.obj.length)];
      const f = document.createElement('div'); f.className = 'emoji-floater'; f.innerText = obj;
      f.style.left = Math.random() * 90 + 'vw'; f.style.top = Math.random() * 90 + 'vh';
      f.style.animationDuration = (15 + Math.random() * 15) + 's';
      document.getElementById('floating-objects').appendChild(f);
    }

    function startApp() {
      document.getElementById('splash-screen').style.display = 'none'; 
      document.getElementById('main-app').style.display = 'block'; 
      document.getElementById('donate-badge').style.display = 'flex'; 
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const o = audioCtx.createOscillator(); o.connect(audioCtx.destination); o.start(0); o.stop(0.01); } catch(e) {}
      startTimer(); showQuestion(0); 
    }

    function startTimer() {
      const tEl = document.getElementById('timer-text');
      timerInterval = setInterval(() => {
        timeRemaining--; let m = Math.floor(timeRemaining / 60); let s = timeRemaining % 60;
        tEl.innerText = `⏳ ${m}:${s < 10 ? '0'+s : s}`;
        if (timeRemaining <= 0) { clearInterval(timerInterval); alert("Hết thời gian làm bài!"); }
      }, 1000);
    }

    function playSound(isCorrect) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      try {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        if (isCorrect) { o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); g.gain.setValueAtTime(0.5, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.2);
        } else { o.type = 'sawtooth'; o.frequency.setValueAtTime(200, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); g.gain.setValueAtTime(0.4, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.2); }
      } catch(e) {}
    }

    function fireConfetti() {
      const c = [document.documentElement.style.getPropertyValue('--primary') || '#00f2fe', '#facc15', '#ffffff'];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div'); p.className = 'particle';
        p.style.backgroundColor = c[Math.floor(Math.random() * c.length)];
        p.style.left = (window.innerWidth/2) + 'px'; p.style.top = (window.innerHeight/2) + 'px';
        p.style.setProperty('--tx', `${(Math.random() - 0.5) * 300}px`); p.style.setProperty('--ty', `${(Math.random() - 0.5) * 300}px`);
        document.body.appendChild(p); setTimeout(() => p.remove(), 600);
      }
    }

    window.onload = function() {
      const maDe = new URLSearchParams(window.location.search).get('id');
      if (!maDe || typeof KHO_DE_THI === 'undefined' || !KHO_DE_THI[maDe]) { alert("Lỗi tải đề!"); window.location.href = "index.html"; return; }
      document.getElementById('app-title').innerHTML = `<a href="index.html" class="back-btn-top">⬅ THOÁT</a> <span>${KHO_DE_THI[maDe].tenDe}</span>`;

      let currentQ = null; 
      KHO_DE_THI[maDe].noiDung.split('\n').forEach(line => {
        line = line.trim(); if (!line || line.match(/^\d+$/)) return;
        if (line.match(/^Câu\s*\d+:/i)) {
          if (currentQ) allQuestions.push(currentQ);
          currentQ = { title: line.replace(/^Câu\s*\d+:/i, '').trim(), options: [], ans: null, idx: null };
        } else if (line.startsWith('*')) {
          if (currentQ) currentQ.options.push({ text: line.substring(1).trim(), isC: true });
        } else if (line.startsWith('•')) {
          if (currentQ) currentQ.options.push({ text: line.substring(1).trim(), isC: false });
        } else {
          if (currentQ && currentQ.options.length === 0) currentQ.title += "<br>" + line; 
        }
      });
      if (currentQ) allQuestions.push(currentQ);
      buildCards(); buildStarMap(); changeTheme('space'); 
    };

    function buildCards() {
      const c = document.getElementById('quiz-container'); c.innerHTML = ''; 
      allQuestions.forEach((q, i) => {
        if(q.options.length === 0) return;
        const div = document.createElement('div'); div.className = 'question-box'; div.id = 'qcard-' + i;
        div.innerHTML = `<span class="question-number">CÂU SỐ ${i + 1}</span><div class="question-title">${q.title}</div><div class="options-container"></div>
          <div class="jump-loader-container" id="loader-${i}"><div class="jump-text" id="jump-text-${i}">Chuyển câu: 2s</div><div class="jump-bar-bg"><div class="jump-bar-fill" id="jump-fill-${i}"></div></div></div>`;
        const optC = div.querySelector('.options-container');
        q.options.forEach((opt, oIdx) => {
          const oDiv = document.createElement('div'); oDiv.className = 'option'; oDiv.innerHTML = opt.text;
          oDiv.onclick = function() {
            if (q.ans !== null) return; 
            Array.from(optC.children).forEach(el => el.classList.add('disabled')); playSound(opt.isC); q.idx = oIdx;
            if (opt.isC) { this.classList.add('correct'); q.ans = true; correctAnswers++; fireConfetti(); } 
            else { this.classList.add('incorrect'); q.ans = false; Array.from(optC.children).forEach((el, x) => { if(q.options[x].isC) el.classList.add('correct'); }); }
            answeredQuestions++; updateStats(); updateStarMapNode(i, q.ans); handlePostAnswer(i);
          };
          optC.appendChild(oDiv);
        });
        c.appendChild(div);
      });
      updateStats();
    }

    function handlePostAnswer(i) {
      document.getElementById(`loader-${i}`).style.display = 'block'; 
      let t = 2000; document.getElementById(`jump-fill-${i}`).style.width = '100%';
      jumpTimer = setInterval(() => {
        t -= 50; document.getElementById(`jump-fill-${i}`).style.width = (t/2000)*100 + '%';
        document.getElementById(`jump-text-${i}`).innerText = `Chuyển câu: ${(t/1000).toFixed(1)}s`;
        if (t <= 0) { clearInterval(jumpTimer); manualJump('next'); }
      }, 50);
    }

    function updateStats() {
      const pDone = allQuestions.length === 0 ? 0 : Math.floor((answeredQuestions / allQuestions.length) * 100);
      document.getElementById('score-text').innerText = `Đúng: ${answeredQuestions===0?0:Math.round((correctAnswers/answeredQuestions)*100)}%`;
      document.getElementById('progress-bar').style.width = pDone + '%';
      document.getElementById('nav-prev').style.display = activeIndex > 0 ? 'flex' : 'none';
      document.getElementById('nav-next').style.display = activeIndex < allQuestions.length - 1 ? 'flex' : 'none';
      
      const pts = [[],['hp-3d-1'],['hp-3d-1','hp-3d-2'],['hp-3d-1','hp-3d-2','hp-3d-3'],['hp-3d-1','hp-3d-2','hp-3d-3','hp-3d-4'],['hp-3d-1','hp-3d-2','hp-3d-3','hp-3d-4','hp-3d-6'],['hp-3d-1','hp-3d-2','hp-3d-3','hp-3d-4','hp-3d-6','hp-3d-7']];
      let lvl = pDone>0?1:0; if(pDone>=20) lvl=2; if(pDone>=40) lvl=3; if(pDone>=60) lvl=4; if(pDone>=80) lvl=5; if(pDone===100) lvl=6;
      document.querySelectorAll('.house-part-3d').forEach(el => el.classList.remove('built'));
      pts[lvl].forEach(id => { const x = document.getElementById(id); if(x) x.classList.add('built'); });
      
      let nLvl = Math.floor(pDone / 5);
      if (nLvl > currentLevel5Percent) { currentLevel5Percent = nLvl; document.getElementById('universe').style.filter = `hue-rotate(${nLvl * 18}deg)`; spawnThemeObject(); }
    }

    function manualJump(dir) {
      if (jumpTimer) clearInterval(jumpTimer);
      const c = document.getElementById(`qcard-${activeIndex}`); if(c) c.style.display = 'none'; 
      if (dir === 'next' && activeIndex < allQuestions.length - 1) activeIndex++;
      else if (dir === 'prev' && activeIndex > 0) activeIndex--;
      showQuestion(activeIndex);
    }

    function showQuestion(i) {
      if(synth.speaking) {
         synth.cancel();
         document.getElementById('btn-speak').innerHTML = "🔊 ĐỌC CÂU HỎI";
         document.getElementById('btn-speak').style.background = "#ff00de";
      }

      document.getElementById('nav-prev').style.display = i > 0 ? 'flex' : 'none';
      document.getElementById('nav-next').style.display = i < allQuestions.length - 1 ? 'flex' : 'none';
      const c = document.getElementById(`qcard-${i}`);
      if(c) { c.style.display = 'block'; c.classList.remove('active'); void c.offsetWidth; c.classList.add('active'); const l = c.querySelector('.jump-loader-container'); if(l) l.style.display = 'none'; }
      document.querySelectorAll('.node').forEach(n => n.classList.remove('node-active'));
      const aN = document.getElementById(`node-${i}`); if(aN) { aN.classList.add('node-active'); aN.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    }

    function toggleMapDrawer() { document.getElementById('question-map-drawer').classList.toggle('open'); }

    function buildStarMap() {
      const g = document.getElementById('map-grid-container'); g.innerHTML = '';
      allQuestions.forEach((q, idx) => {
        const n = document.createElement('div'); n.className = 'node'; n.id = `node-${idx}`; n.innerText = idx + 1;
        if (q.ans === true) n.classList.add('node-correct'); else if (q.ans === false) n.classList.add('node-wrong');
        n.onclick = () => { document.getElementById('question-map-drawer').classList.remove('open'); if(idx !== activeIndex) { if (jumpTimer) clearInterval(jumpTimer); const c = document.getElementById(`qcard-${activeIndex}`); if(c) c.style.display = 'none'; activeIndex = idx; showQuestion(activeIndex); } };
        g.appendChild(n);
      });
      showQuestion(0);
    }

    function updateStarMapNode(i, isC) {
      const n = document.getElementById(`node-${i}`);
      if(n) { n.classList.remove('node-correct', 'node-wrong'); n.classList.add(isC ? 'node-correct' : 'node-wrong'); }
    }

    function openReviewMode() {
      if (jumpTimer) { clearInterval(jumpTimer); const l = document.getElementById(`loader-${activeIndex}`); if(l) l.style.display = 'none'; }
      const c = document.getElementById('review-content'); c.innerHTML = '';
      allQuestions.forEach((q, i) => {
        const d = document.createElement('div'); d.className = 'review-item';
        let b = '<span class="review-status-badge badge-unanswered">Chưa làm</span>';
        if (q.ans === true) b = '<span class="review-status-badge badge-correct">Đúng</span>';
        else if (q.ans === false) b = '<span class="review-status-badge badge-wrong">Sai</span>';
        let h = `${b}<div class="review-q-title">Câu ${i + 1}: ${q.title}</div>`;
        q.options.forEach((opt, oIdx) => {
          let cl = 'review-opt'; if (opt.isC) cl += ' is-correct'; if (q.idx === oIdx && !opt.isC) cl += ' is-wrong';
          h += `<div class="${cl}">${opt.isC ? '✅ ' : (q.idx === oIdx ? '❌ ' : '')}${opt.text}</div>`;
        });
        d.innerHTML = h; c.appendChild(d);
      });
      document.getElementById('review-modal').style.display = 'flex';
    }

    function closeReviewMode() { document.getElementById('review-modal').style.display = 'none'; }
  </script>
</body>
</html>
