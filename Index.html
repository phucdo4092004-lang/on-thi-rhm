<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trung Tâm Luyện Thi CCHN 2027 - Nha Khoa Phúc VIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #007bff; /* Xanh y tế */
      --secondary-color: #f8f9fa; /* Trắng xám nhẹ */
      --text-color: #343a40; /* Đen xám */
      --success-color: #28a745; /* Xanh lá */
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--secondary-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      background-color: #fff;
      width: 100%;
      padding: 20px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
      color: var(--primary-color);
      text-transform: uppercase;
    }

    header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #6c757d;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 800px;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-top: 30px;
      margin-bottom: 15px;
      color: var(--text-color);
      border-left: 4px solid var(--primary-color);
      padding-left: 10px;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
    }

    .quiz-card {
      background-color: #fff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: 1px solid #e9ecef;
    }

    .quiz-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .quiz-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      color: var(--primary-color);
    }

    .quiz-card p {
      margin: 5px 0;
      font-size: 13px;
      color: #6c757d;
    }

    .start-button {
      background-color: var(--primary-color);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 700;
      width: 100%;
      cursor: pointer;
      margin-top: 15px;
    }

    footer {
      background-color: #fff;
      width: 100%;
      padding: 20px 0;
      text-align: center;
      border-top: 1px solid #e9ecef;
      font-size: 12px;
      color: #6c757d;
    }

    /* Hiệu ứng mượt mà */
    * {
      transition: all 0.2s ease-in-out;
    }
  </style>
</head>
<body>

  <header>
    <h1>Trung Tâm Luyện Thi CCHN 2027</h1>
    <p>Nha Khoa Phúc VIP - Đồng hành cùng bạn</p>
  </header>

  <main>
    <h2>🎯 DANH SÁCH ĐỀ THI TRẮC NGHIỆM</h2>
    <div class="quiz-grid" id="trac-nghiem-list">
      </div>
  </main>

  <footer>
    <p>&copy; 2023 Nha Khoa Phúc VIP. All rights reserved.</p>
  </footer>

  <script src="KhoDuLieu.js"></script>
  <script>
    // Tự động load danh sách đề thi từ KhoDuLieu.js
    const listContainer = document.getElementById('trac-nghiem-list');
    
    // Kiểm tra xem dữ liệu có tồn tại không
    if (typeof KHO_DE_THI !== 'undefined') {
      for (const maDe in KHO_DE_THI) {
        const deThi = KHO_DE_THI[maDe];
        
        // Tạo HTML cho từng đề thi
        listContainer.innerHTML += `
          <div class="quiz-card" onclick="window.location.href='Play.html?id=${maDe}'">
            <h3>${deThi.tenDe}</h3>
            <p>${deThi.moTa}</p>
            <p style="color:var(--success-color); font-weight: 700;">● ${deThi.soCau} câu hỏi</p>
            <button class="start-button">BẮT ĐẦU LÀM BÀI</button>
          </div>
        `;
      }
    } else {
      listContainer.innerHTML = '<p style="text-align:center; color:#dc3545; width:100%;">Lỗi: Không tìm thấy dữ liệu đề thi.</p>';
    }
  </script>

</body>
</html>
