<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VŨ TRỤ CỦA PHÚC ĐẸP TRAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #007bff; --accent: #ff00de; --bg: #f4f7f6; --white: #ffffff; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
    header { background: var(--white); padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative;}
    header h1 { margin: 0; color: var(--primary); font-size: 30px; font-weight: 900; text-transform: uppercase; }
    header p { color: #6c757d; font-weight: 600; margin-top: 10px;}
    
    /* Nút Admin Thần Thánh */
    .admin-btn { position: absolute; top: 20px; right: 20px; background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 12px;}
    .admin-btn:hover { background: var(--accent); transform: scale(1.05);}

    main { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
    
    .search-container { margin: 0 auto 40px auto; max-width: 600px; position: relative; }
    .search-box { width: 100%; padding: 18px 25px; border-radius: 50px; border: 2px solid #e1e4e8; font-size: 16px; font-family: inherit; font-weight: 600; box-sizing: border-box; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); outline: none; }
    .search-box:focus { border-color: var(--primary); box-shadow: 0 5px 20px rgba(0,123,255,0.2); }
    
    h2 { border-left: 6px solid var(--accent); padding-left: 15px; font-size: 22px; margin-bottom: 25px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }
    .card { background: var(--white); border-radius: 24px; padding: 25px; border: 1px solid #e1e4e8; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between;}
    .card:hover { transform: translateY(-8px); box-shadow: 0 15px 35px rgba(0,123,255,0.15); border-color: var(--primary); }
    .card h3 { margin: 0 0 10px; font-size: 18px; color: #222; }
    .card p { margin: 0 0 15px; font-size: 14px; color: #6c757d; line-height: 1.5; }
    .btn { width: 100%; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: auto; transition: 0.2s;}
    .btn-quiz { background: var(--primary); color: #fff; }
    .btn-read { background: var(--accent); color: #fff; }
    .btn:hover { filter: brightness(1.1); }
    
    .donate-box { background: linear-gradient(135deg, #fff, #f0f7ff); border: 2px dashed var(--accent); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 50px; cursor: pointer; transition: 0.3s;}
    .donate-box:hover { transform: scale(1.02); }
    .donate-box h3 { margin: 0 0 10px; color: var(--accent); font-size: 20px; }
    .stk { font-size: 24px; font-weight: 900; color: var(--primary); display: block; margin: 10px 0; letter-spacing: 1px;}

    /* TOOL NHẬP LIỆU ADMIN */
    #admin-modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
    .admin-panel { background: #fff; width: 90%; max-width: 600px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; position: relative;}
    .admin-panel h2 { border: none; padding: 0; margin: 0 0 20px 0; color: var(--primary); text-align: center; font-size: 24px;}
    .close-admin { position: absolute; top: 15px; right: 20px; font-size: 24px; font-weight: 900; cursor: pointer; color: #ef4444; border: none; background: none;}
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: 800; margin-bottom: 5px; font-size: 14px; color: #333;}
    .form-control { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; box-sizing: border-box; }
    textarea.form-control { min-height: 150px; resize: vertical; }
    .btn-generate { background: #10b981; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: 900; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px;}
    .btn-generate:hover { background: #059669; }
    .radio-group { display: flex; gap: 20px; margin-bottom: 15px; font-weight: 700;}
  </style>
</head>
<body>
  <header>
    <h1>VŨ TRỤ CỦA PHÚC ĐẸP TRAI</h1>
    <p>KHO DỮ LIỆU ĐƯỢC ĐỘC QUYỀN BỞI PHÚC ĐẸP TRAI</p>
    <button class="admin-btn" onclick="openAdmin()">🛠️ THÊM ĐỀ/TÀI LIỆU</button>
  </header>

  <main>
    <div class="search-container">
      <input type="text" id="searchInput" class="search-box" onkeyup="searchApp()" placeholder="🔍 Nhập tên đề hoặc tài liệu để tìm nhanh...">
    </div>

    <div class="donate-box" onclick="copySTK()">
      <h3>💖 Ủng hộ Ly Cafe cho Phúc</h3>
      <span class="stk">BIDV: 8812766209</span>
      <p style="margin:0; font-weight:800; color:#555;">ĐỖ HỒNG PHÚC</p>
    </div>

    <h2 id="title-quiz">🎯 CHIẾN DỊCH TRẮC NGHIỆM</h2>
    <div class="grid" id="quiz-list"></div>

    <h2 id="title-read" style="border-color: var(--primary)">📚 THƯ VIỆN LÝ THUYẾT</h2>
    <div class="grid" id="read-list"></div>
  </main>

  <div id="admin-modal">
    <div class="admin-panel">
      <button class="close-admin" onclick="closeAdmin()">×</button>
      <h2>TRẠM NHẬP LIỆU TỰ ĐỘNG</h2>
      <p style="font-size: 13px; color: #666; text-align:center; margin-top:-15px;">Dán nội dung vào đây, máy sẽ tự đóng gói thành Code chuẩn!</p>
      
      <div class="radio-group">
        <label><input type="radio" name="loai" value="trac_nghiem" checked> Đề Trắc Nghiệm</label>
        <label><input type="radio" name="loai" value="tai_lieu"> Bài Đọc Tài Liệu</label>
      </div>

      <div class="form-group">
        <label>Tiêu đề (Ví dụ: Khớp cắn học 1)</label>
        <input type="text" id="input-title" class="form-control" placeholder="Nhập tiêu đề...">
      </div>
      
      <div class="form-group">
        <label>Mô tả ngắn gọn</label>
        <input type="text" id="input-desc" class="form-control" placeholder="Nhập mô tả...">
      </div>

      <div class="form-group">
        <label>Nội dung (Copy từ Word/PDF dán vào)</label>
        <textarea id="input-content" class="form-control" placeholder="Dán nội dung vào đây..."></textarea>
      </div>

      <button class="btn-generate" onclick="generateAndCopy()">🚀 TẠO CODE & COPY</button>
    </div>
  </div>

  <script src="KhoDuLieu.js"></script>
  <script>
    function copySTK() {
      navigator.clipboard.writeText('8812766209');
      alert("Đã copy STK Phúc Đẹp Trai! Cảm ơn sếp rất nhiều.");
    }

    // Load dữ liệu hiển thị lên web
    const qList = document.getElementById('quiz-list');
    if (typeof KHO_DE_THI !== 'undefined') {
      for (const id in KHO_DE_THI) {
        const item = KHO_DE_THI[id];
        qList.innerHTML += `<div class="card item-card" onclick="location.href='Play.html?id=${id}'">
          <h3 class="item-title">${item.tenDe}</h3><p class="item-desc">${item.moTa}</p>
          <div style="color: #28a745; font-weight: 800; margin-bottom: 15px; font-size:13px;">🎯 ${item.soCau} câu hỏi</div>
          <button class="btn btn-quiz">VÀO THI</button>
        </div>`;
      }
    }

    const rList = document.getElementById('read-list');
    if (typeof KHO_TAI_LIEU !== 'undefined') {
      for (const id in KHO_TAI_LIEU) {
        const item = KHO_TAI_LIEU[id];
        rList.innerHTML += `<div class="card item-card" onclick="location.href='Read.html?id=${id}'">
          <h3 class="item-title" style="color: var(--accent)">${item.tieuDe}</h3><p class="item-desc">${item.moTa}</p>
          <button class="btn btn-read">MỞ ĐỌC</button>
        </div>`;
      }
    }

    function searchApp() {
      let input = document.getElementById('searchInput').value.toLowerCase();
      let cards = document.getElementsByClassName('item-card');
      for (let i = 0; i < cards.length; i++) {
        let title = cards[i].querySelector('.item-title').innerText.toLowerCase();
        let desc = cards[i].querySelector('.item-desc').innerText.toLowerCase();
        if (title.includes(input) || desc.includes(input)) {
          cards[i].style.display = "";
        } else {
          cards[i].style.display = "none";
        }
      }
    }

    // CHỨC NĂNG ADMIN NHẬP LIỆU
    function openAdmin() { document.getElementById('admin-modal').style.display = 'flex'; }
    function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }

    function generateAndCopy() {
      const loai = document.querySelector('input[name="loai"]:checked').value;
      const title = document.getElementById('input-title').value.trim();
      const desc = document.getElementById('input-desc').value.trim();
      const content = document.getElementById('input-content').value.trim();

      if(!title || !content) {
        alert("Sếp vui lòng nhập đủ Tiêu đề và Nội dung nhé!");
        return;
      }

      // Tạo ID ngẫu nhiên không bao giờ trùng
      const makeId = "item_" + Math.floor(Math.random() * 1000000);
      let finalCode = "";

      if(loai === 'trac_nghiem') {
        // Tự động đếm số câu hỏi có chữ "Câu"
        const count = (content.match(/^Câu\s*(hỏi)?\s*\d+\s*[:\.\-]?/gmi) || []).length;
        
        finalCode = `
  "${makeId}": {
    tenDe: "${title}",
    moTa: "${desc}",
    soCau: ${count},
    noiDung: \`
${content}
    \`
  },`;
        alert(`Đã đếm được ${count} câu hỏi. Đã đóng gói Code thành công!`);
      } else {
        finalCode = `
  "${makeId}": {
    tieuDe: "${title}",
    moTa: "${desc}",
    noiDung: \`
${content}
    \`
  },`;
        alert("Đã đóng gói Code Tài liệu thành công!");
      }

      // Copy vào bộ nhớ tạm
      navigator.clipboard.writeText(finalCode).then(() => {
        const cfm = confirm("ĐÃ COPY CODE CHUẨN VÀO BỘ NHỚ!\n\nSếp chỉ cần bấm OK, web sẽ tự mở tab GitHub. Sếp vào file KhoDuLieu.js, dán (Paste) cái code này nối xuống dưới là xong!");
        if(cfm) {
          window.open("https://github.com", "_blank"); // Mở Github để sếp dán
        }
        closeAdmin();
        document.getElementById('input-title').value = '';
        document.getElementById('input-desc').value = '';
        document.getElementById('input-content').value = '';
      });
    }
  </script>
</body>
</html>
